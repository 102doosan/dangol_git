<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SFMA 결과 화면 디자인</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #1A1A2E; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 20px 16px 48px; gap: 20px;
    }

    /* ── 툴바 ── */
    .toolbar { width: 100%; max-width: 1100px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .toolbar-title { font-size: 18px; font-weight: 900; color: #fff; margin-right: auto; }
    .screen-btn {
      padding: 7px 15px; border-radius: 99px; border: none; cursor: pointer;
      font-size: 12px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif;
      background: #2A2A4A; color: #A0AEC0; transition: all 0.2s;
    }
    .screen-btn.active { background: #7B61FF; color: #fff; }
    .screen-btn:hover:not(.active) { background: #3A3A5A; color: #fff; }
    .member-select-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .member-select-label { font-size: 12px; color: #9B84FF; font-weight: 700; }
    .member-chip {
      padding: 5px 12px; border-radius: 99px; border: 1.5px solid #3A3A5A;
      background: #2A2A4A; color: #A0AEC0; font-size: 11px; font-weight: 700;
      cursor: pointer; transition: all .15s; font-family: 'Noto Sans KR', sans-serif;
    }
    .member-chip.active { background: #553C9A; border-color: #9B84FF; color: #fff; }

    /* ── 워크스페이스 ── */
    .workspace { width: 100%; max-width: 1100px; display: flex; gap: 28px; align-items: flex-start; }

    /* ── 폰 프레임 ── */
    .phone {
      width: 375px; min-height: 740px; background: #fff;
      border-radius: 44px;
      box-shadow: 0 0 0 10px #111, 0 30px 80px rgba(0,0,0,0.6);
      overflow: hidden; position: relative; display: flex; flex-direction: column; flex-shrink: 0;
    }
    .phone-notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 120px; height: 28px; background: #111; border-radius: 0 0 18px 18px; z-index: 10; }
    .phone-screen { flex: 1; overflow: hidden; position: relative; margin-top: 28px; }
    .screen-frame { position: absolute; inset: 0; display: none; flex-direction: column; background: #F5F3FF; overflow-y: auto; }
    .screen-frame.active { display: flex; }

    /* 공통 앱 헤더 */
    .app-header { background: #6B46C1; color: #fff; padding: 12px 18px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .app-header .back { font-size: 17px; cursor: pointer; }
    .app-header .title { font-size: 16px; font-weight: 700; flex: 1; }

    /* ── ① 결과 메인 ── */
    .main-top { background: linear-gradient(135deg, #553C9A 0%, #7B61FF 100%); padding: 18px 18px 28px; color: #fff; flex-shrink: 0; }
    .main-top .sub { font-size: 12px; opacity: 0.8; margin-bottom: 3px; }
    .main-top .heading { font-size: 20px; font-weight: 900; }
    .main-top .date-badge { display: inline-block; margin-top: 7px; background: rgba(255,255,255,0.2); border-radius: 99px; padding: 3px 13px; font-size: 11px; font-weight: 700; }

    .score-card { margin: -18px 14px 0; background: #fff; border-radius: 18px; padding: 16px; box-shadow: 0 4px 20px rgba(123,97,255,0.2); flex-shrink: 0; }
    .sc-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .sc-label { font-size: 12px; font-weight: 700; color: #4A5568; }
    .sc-grade { border-radius: 99px; padding: 3px 12px; font-size: 12px; font-weight: 800; }
    .sc-total { font-size: 32px; font-weight: 900; color: #7B61FF; }
    .sc-max { font-size: 15px; color: #A0AEC0; font-weight: 600; }
    .sc-bar-bg { background: #EDF2F7; border-radius: 99px; height: 8px; overflow: hidden; margin-top: 3px; }
    .sc-bar { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #7B61FF, #9B84FF); }
    .next-date-row { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; padding-top: 10px; border-top: 1px solid #F0F4F8; }
    .next-date-label { font-size: 11px; font-weight: 700; color: #A0AEC0; }
    .next-date-val { font-size: 12px; font-weight: 800; color: #1A202C; }
    .next-date-dday { font-size: 11px; font-weight: 800; padding: 2px 9px; border-radius: 99px; }
    .dday-ok      { background: #C6F6D5; color: #276749; }
    .dday-soon    { background: #FEFCBF; color: #744210; }
    .dday-overdue { background: #FED7D7; color: #742A2A; }

    /* 결과 섹션 (차트+분석) */
    .result-section { margin: 12px 14px 0; background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
    .rs-header { background: #2C3E6B; color: #fff; padding: 9px 14px; font-size: 12px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
    .rs-round-tag { font-size: 10px; color: rgba(255,255,255,0.65); }
    .rs-body { display: flex; flex-direction: column; }
    .rs-chart { padding: 12px 14px; border-bottom: 1px solid #F0F4F8; }
    .rs-analysis { padding: 12px 14px; }

    /* 막대 차트 */
    .bar-chart { display: flex; align-items: flex-end; gap: 14px; height: 90px; padding-bottom: 2px; }
    .bc-col { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; }
    .bc-bar-wrap { flex: 1; width: 100%; display: flex; align-items: flex-end; }
    .bc-bar { width: 100%; border-radius: 4px 4px 0 0; position: relative; min-height: 0; }
    .bc-bar-val { font-size: 11px; font-weight: 900; position: absolute; top: -17px; left: 50%; transform: translateX(-50%); white-space: nowrap; }
    .bc-lbl { font-size: 10px; font-weight: 800; }
    .bar-dp { background: #E53E3E; } .val-dp { color: #E53E3E; } .lbl-dp { color: #E53E3E; }
    .bar-dn { background: #FC8181; } .val-dn { color: #FC8181; } .lbl-dn { color: #FC8181; }
    .bar-fp { background: #90CDF4; } .val-fp { color: #4299E1; } .lbl-fp { color: #4299E1; }
    .bar-fn { background: #2B6CB0; } .val-fn { color: #2B6CB0; } .lbl-fn { color: #2B6CB0; }
    .bc-legend { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px 14px; }
    .bc-leg { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #4A5568; }
    .bc-leg-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

    /* 분석결과 */
    .an-text { font-size: 11px; color: #2D3748; line-height: 1.7; margin-bottom: 10px; }
    .an-chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .an-chip { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 99px; }
    .an-fn { background: #EBF8FF; color: #2B6CB0; }
    .an-fp { background: #FFFAF0; color: #B7791F; }
    .an-dp { background: #FFF5F5; color: #C53030; }
    .an-dn { background: #F7FAFC; color: #4A5568; }
    .an-tot { font-size: 10px; color: #A0AEC0; }

    /* 15항목 테이블 */
    .detail-table-wrap { margin: 10px 14px 0; background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
    .dt-header { background: #2C3E6B; color: #fff; padding: 9px 14px; font-size: 12px; font-weight: 800; display: flex; justify-content: space-between; }
    .dt-round-tag { font-size: 10px; color: rgba(255,255,255,0.65); }
    .dtbl { width: 100%; border-collapse: collapse; font-size: 11px; }
    .dtbl th { background: #F7F9FC; padding: 7px 12px; font-weight: 800; color: #718096; font-size: 10px; text-align: left; border-bottom: 1px solid #E2E8F0; }
    .dtbl th.tr { text-align: right; }
    .dtbl td { padding: 8px 12px; border-bottom: 1px solid #F0F4F8; color: #2D3748; }
    .dtbl tr:last-child td { border-bottom: none; }
    .dtbl td.tr { text-align: right; }
    .dtbl tr:hover td { background: #F9F7FF; }
    .rb { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 5px; display: inline-block; }
    .rb-fn { background: #EBF8FF; color: #2B6CB0; }
    .rb-fp { background: #FFFAF0; color: #B7791F; }
    .rb-dp { background: #FFF5F5; color: #C53030; }
    .rb-dn { background: #F7FAFC; color: #4A5568; }

    /* 버튼 행 */
    .btn-row { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
    .btn-primary { background: #7B61FF; color: #fff; border: none; border-radius: 12px; padding: 12px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
    .btn-secondary { background: #fff; color: #7B61FF; border: 2px solid #7B61FF; border-radius: 12px; padding: 10px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }

    /* ── ② 결과 상세 ── */
    .detail-hero { background: linear-gradient(135deg,#553C9A,#7B61FF); padding: 18px 18px 24px; color: #fff; flex-shrink: 0; }
    .detail-hero .d-back { font-size: 16px; cursor: pointer; margin-bottom: 10px; display: block; }
    .d-name { font-size: 18px; font-weight: 900; }
    .d-date { font-size: 11px; opacity: 0.8; margin-top: 3px; }
    .d-score-row { display: flex; align-items: baseline; gap: 5px; margin-top: 10px; }
    .d-score { font-size: 38px; font-weight: 900; }
    .d-max { font-size: 16px; opacity: 0.65; }
    .d-grade { background: rgba(255,255,255,0.25); border-radius: 99px; padding: 3px 11px; font-size: 11px; font-weight: 700; margin-left: 4px; }
    .detail-section { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
    .detail-item { background: #fff; border-radius: 12px; padding: 12px 14px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
    .di-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .di-icon { font-size: 18px; }
    .di-name { flex: 1; font-size: 13px; font-weight: 700; color: #1A202C; }
    .di-score { font-size: 16px; font-weight: 900; }
    .di-bar-bg { background: #EDF2F7; border-radius: 99px; height: 7px; overflow: hidden; margin-bottom: 8px; }
    .di-bar { height: 100%; border-radius: 99px; }
    .check-row { display: flex; flex-wrap: wrap; gap: 5px; }
    .ck { padding: 3px 9px; border-radius: 99px; font-size: 10px; font-weight: 700; }
    .ck-fn { background: #EBF8FF; color: #2B6CB0; }
    .ck-fp { background: #FFFAF0; color: #B7791F; }
    .ck-dp { background: #FFF5F5; color: #C53030; }
    .ck-dn { background: #F7FAFC; color: #4A5568; }
    .opinion-box { margin: 0 14px 14px; background: #EDE9FE; border-radius: 12px; padding: 12px 14px; border-left: 3px solid #7B61FF; }
    .op-title { font-size: 11px; font-weight: 800; color: #6B46C1; margin-bottom: 5px; }
    .op-text { font-size: 12px; color: #44337A; line-height: 1.7; }

    /* ── ③ 결과 비교 ── */
    .compare-sel { background: #fff; padding: 12px 14px; flex-shrink: 0; border-bottom: 1px solid #E2E8F0; }
    .csel-label { font-size: 10px; font-weight: 800; color: #7B61FF; margin-bottom: 7px; }
    .round-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .round-chip { padding: 5px 12px; border-radius: 99px; font-size: 11px; font-weight: 700; border: 1.5px solid #E2E8F0; cursor: pointer; transition: all .15s; background: #fff; color: #718096; font-family: 'Noto Sans KR', sans-serif; }
    .round-chip.on { background: #7B61FF; color: #fff; border-color: #7B61FF; }
    .compare-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 0; overflow-y: auto; flex: 1; }

    /* ── ④ 이력 목록 ── */
    .app-body { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
    .history-item { background: #fff; border-radius: 14px; padding: 13px 14px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); cursor: pointer; display: flex; align-items: center; gap: 12px; }
    .history-num { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; background: #EDE9FE; color: #6B46C1; font-size: 12px; font-weight: 800; display: flex; align-items: center; justify-content: center; }
    .history-num.latest { background: #7B61FF; color: #fff; }
    .history-info { flex: 1; }
    .history-round { font-size: 12px; font-weight: 700; color: #1A202C; }
    .history-date { font-size: 11px; color: #A0AEC0; margin-top: 1px; }
    .history-chips { margin-top: 4px; display: flex; gap: 3px; flex-wrap: wrap; }
    .history-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .history-score { font-size: 20px; font-weight: 900; color: #7B61FF; }
    .history-grade { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 99px; background: #EDE9FE; color: #6B46C1; }
    .history-change { font-size: 10px; font-weight: 700; }

    /* 등급 */
    .g-excellent { background: #C6F6D5; color: #1A4731; }
    .g-good      { background: #BEE3F8; color: #1A365D; }
    .g-average   { background: #FEFCBF; color: #744210; }
    .g-poor      { background: #FED7D7; color: #742A2A; }

    /* ── 메모판 ── */
    .memo-panel { flex: 1; background: #16213E; border-radius: 20px; padding: 22px; min-height: 600px; display: flex; flex-direction: column; gap: 12px; }
    .memo-panel h3 { font-size: 13px; font-weight: 800; color: #9B84FF; letter-spacing: 1px; }
    .memo-field { background: #0F3460; border-radius: 10px; padding: 12px 14px; }
    .memo-field label { display: block; font-size: 10px; font-weight: 700; color: #9B84FF; margin-bottom: 5px; }
    .memo-field textarea, .memo-field input { width: 100%; background: transparent; border: none; outline: none; color: #E2E8F0; font-family: 'Noto Sans KR', sans-serif; font-size: 12px; resize: none; }
    .memo-field textarea { min-height: 64px; line-height: 1.6; }
    .memo-divider { height: 1px; background: #1E3A5F; }
  </style>
</head>
<body>

<div class="toolbar">
  <span class="toolbar-title">📊 SFMA 결과 화면 디자인</span>
  <button class="screen-btn active" onclick="go('main')">① 결과 메인</button>
  <button class="screen-btn" onclick="go('detail')">② 결과 상세</button>
  <button class="screen-btn" onclick="go('compare')">③ 결과 비교</button>
  <button class="screen-btn" onclick="go('history')">④ 이력 목록</button>
</div>

<!-- 회원 선택 -->
<div class="toolbar">
  <div class="member-select-bar">
    <span class="member-select-label">👤 회원 선택:</span>
    <div id="member-chips"></div>
  </div>
</div>

<div class="workspace">
  <!-- 폰 프레임 -->
  <div class="phone">
    <div class="phone-notch"></div>
    <div class="phone-screen">

      <!-- ① 결과 메인 -->
      <div class="screen-frame active" id="screen-main">
        <div class="main-top">
          <div class="sub">📊 SFMA 결과</div>
          <div class="heading">최근 측정 결과</div>
          <div class="date-badge" id="main-date-badge"></div>
        </div>
        <div class="score-card">
          <div class="sc-row">
            <div class="sc-label">총점</div>
            <span class="sc-grade" id="main-grade-badge"></span>
          </div>
          <div style="display:flex;align-items:baseline;gap:5px;margin-bottom:8px;">
            <span class="sc-total" id="main-score"></span>
            <span class="sc-max">/ 100</span>
          </div>
          <div class="sc-bar-bg"><div class="sc-bar" id="main-score-bar"></div></div>
          <div id="next-date-row"></div>
        </div>

        <!-- 차트 -->
        <div class="result-section">
          <div class="rs-header">
            <span id="rs-header-text"></span>
            <span class="rs-round-tag" id="rs-round-tag"></span>
          </div>
          <div id="rs-chart" style="padding:12px 14px;"></div>
        </div>

        <!-- 분석결과 -->
        <div class="result-section" style="margin-top:8px;">
          <div class="rs-header">분석결과</div>
          <div id="rs-analysis" style="padding:12px 14px;"></div>
        </div>

        <!-- 15항목 테이블 -->
        <div class="detail-table-wrap">
          <div class="dt-header">
            <span>최고위평가 패턴별 상세 비교</span>
            <span class="dt-round-tag" id="dt-round-tag"></span>
          </div>
          <div id="detail-table-body"></div>
        </div>

        <div class="btn-row">
          <button class="btn-primary" onclick="go('compare')">📈 과거 결과와 비교하기</button>
          <button class="btn-secondary" onclick="go('history')">📋 전체 이력 보기</button>
        </div>
      </div>

      <!-- ② 결과 상세 -->
      <div class="screen-frame" id="screen-detail">
        <div class="detail-hero">
          <span class="d-back" onclick="go('main')">←</span>
          <div class="d-name" id="d-name"></div>
          <div class="d-date" id="d-date"></div>
          <div class="d-score-row">
            <span class="d-score" id="d-score"></span>
            <span class="d-max">/ 100</span>
            <span class="d-grade" id="d-grade"></span>
          </div>
        </div>
        <div class="detail-section" id="detail-section"></div>
        <div class="opinion-box" id="opinion-box" style="display:none;">
          <div class="op-title">📋 트레이너 종합 소견</div>
          <div class="op-text" id="op-text"></div>
        </div>
      </div>

      <!-- ③ 결과 비교 -->
      <div class="screen-frame" id="screen-compare">
        <div class="app-header">
          <span class="back" onclick="go('main')">←</span>
          <span class="title">결과 비교</span>
        </div>
        <div class="compare-sel">
          <div class="csel-label">비교할 회차 선택</div>
          <div class="round-chips" id="round-chips"></div>
        </div>
        <div class="compare-body" id="compare-body"></div>
      </div>

      <!-- ④ 이력 목록 -->
      <div class="screen-frame" id="screen-history">
        <div class="app-header">
          <span class="back" onclick="go('main')">←</span>
          <span class="title">SFMA 이력</span>
        </div>
        <div class="app-body" id="history-body"></div>
        <div style="padding:0 14px 14px;flex-shrink:0;">
          <button class="btn-primary" style="width:100%;" onclick="go('compare')">📈 회차 비교하기</button>
        </div>
      </div>

    </div>
  </div>

  <!-- 메모판 -->
  <div class="memo-panel">
    <h3>📊 SFMA 결과 화면 메모</h3>
    <div class="memo-field">
      <label>현재 화면</label>
      <input type="text" id="memo-screen-name" value="① 결과 메인" readonly />
    </div>
    <div class="memo-divider"></div>
    <div class="memo-field">
      <label>화면 설명 / 목적</label>
      <textarea placeholder="이 화면의 역할과 목적..."></textarea>
    </div>
    <div class="memo-field">
      <label>주요 컴포넌트</label>
      <textarea placeholder="버튼, 카드, 차트, 탭 등 UI 요소..."></textarea>
    </div>
    <div class="memo-field">
      <label>UX 고려사항</label>
      <textarea placeholder="사용자 흐름, 예외 처리, 피드백..."></textarea>
    </div>
    <div class="memo-field">
      <label>개발 메모</label>
      <textarea placeholder="API, 차트 라이브러리, 데이터 구조..."></textarea>
    </div>
    <div class="memo-divider"></div>
    <div class="memo-field">
      <label>화면 흐름</label>
      <textarea readonly style="color:#9B84FF;font-size:11px;">① 결과 메인
  · FN/FP/DP/DN 막대차트 + 분석결과
  · 15항목 패턴별 상세 테이블
  · [과거 비교] → ③  [전체 이력] → ④

② 결과 상세
  · 선택 패턴 항목별 체크 결과
  · 트레이너 소견

③ 결과 비교

/* ══ 헬퍼 ══ */
function gradeInfo(t) {
  if (t>=90) return {label:'우수',cls:'g-excellent'};
  if (t>=75) return {label:'양호',cls:'g-good'};
  if (t>=60) return {label:'보통',cls:'g-average'};
  return {label:'주의',cls:'g-poor'};
}
function scoreColor(s) { return s>=75?'#38A169':s>=60?'#D69E2E':'#E53E3E'; }
const TODAY = '2026-03-26';
const GRADE_DAYS = {우수:180, 양호:90, 보통:60, 주의:30};
function addDays(d,n){const dt=new Date(d);dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10);}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}
function getNextDate(m){
  const h=m.history[0]; if(!h) return null;
  const period=GRADE_DAYS[gradeInfo(h.total).label]||90;
  const next=addDays(h.date, period);
  const left=daysBetween(TODAY, next);
  return {next, period, left, round: h.round+1};
}
function countChecks(checks) {
  const c={FN:0,FP:0,DP:0,DN:0};
  if (!checks) return c;
  Object.values(checks).forEach(v => { if (v in c) c[v]++; });
  return c;
}
function patCnt(checks, keys) {
  const c={FN:0,FP:0,DP:0,DN:0};
  keys.forEach(k => { if (checks[k] && checks[k] in c) c[checks[k]]++; });
  return c;
}
function patScore(cnt) {
  const t=cnt.FN+cnt.FP+cnt.DP+cnt.DN;
  return t?Math.round((cnt.FN*10+cnt.FP*7+cnt.DN*5+cnt.DP*2)/(t*10)*100):null;
}
function fmtDate(d) { const [y,m,dd]=d.split('-'); return `${y}년 ${+m}월 ${+dd}일`; }
function chipsHtml(c) {
  let h='';
  if(c.FN) h+=`<span class="an-chip an-fn">FN ${c.FN}</span>`;
  if(c.FP) h+=`<span class="an-chip an-fp">FP ${c.FP}</span>`;
  if(c.DP) h+=`<span class="an-chip an-dp">DP ${c.DP}</span>`;
  if(c.DN) h+=`<span class="an-chip an-dn">DN ${c.DN}</span>`;
  return h;
}
const rbMap = {FN:'rb-fn',FP:'rb-fp',DP:'rb-dp',DN:'rb-dn'};
const ckMap = {FN:'ck-fn',FP:'ck-fp',DP:'ck-dp',DN:'ck-dn'};

  ).join('');

function selectMember(idx) {

  renderMemberChips();

/* ══ 화면 전환 ══ */
function go(id) {
  document.querySelectorAll('.screen-frame').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  document.querySelectorAll('.screen-btn').forEach((b,i)=>{
    b.classList.toggle('active', ['main','detail','compare','history'][i]===id);
  });
  document.getElementById('memo-screen-name').value = SCREEN_NAMES[id]||id;
}

/* ── ① 결과 메인 ── */
function renderMain() {
  const m = MEMBERS[curMemberIdx], h = m.history[0];
  if (!h) return;
  const gi = gradeInfo(h.total);
  const cnt = countChecks(h.sheetChecks);
  const tot = cnt.FN+cnt.FP+cnt.DP+cnt.DN;
  const fnPct = Math.round((cnt.FN/tot)*100);

  document.getElementById('main-date-badge').textContent = `${fmtDate(h.date)} 측정`;
  document.getElementById('main-score').textContent = h.total;
  document.getElementById('main-score-bar').style.width = h.total + '%';
  const gb = document.getElementById('main-grade-badge');
  gb.textContent = gi.label; gb.className = `sc-grade ${gi.cls}`;

  /* 다음 측정 예정일 */
  const nd = getNextDate(m);
  if (nd) {
    const cls = nd.left < 0 ? 'dday-overdue' : nd.left <= 30 ? 'dday-soon' : 'dday-ok';
    const dday = nd.left < 0 ? `D+${Math.abs(nd.left)}` : `D-${nd.left}`;
    document.getElementById('next-date-row').innerHTML = `
      <div class="next-date-row">
        <div>
          <div class="next-date-label">${nd.round}차 측정 예정일</div>
          <div class="next-date-val">${fmtDate(nd.next)}</div>
        </div>
        <span class="next-date-dday ${cls}">${dday}</span>
      </div>`;
  }

  document.getElementById('rs-header-text').textContent = `결과 · ${h.round}차 (${h.date})`;
  document.getElementById('rs-round-tag').textContent = `${h.round}차`;
  document.getElementById('dt-round-tag').textContent = `${h.round}차  ${h.date}`;

  /* 막대 차트 */
  const maxC = Math.max(cnt.DP,cnt.DN,cnt.FP,cnt.FN,1);
  const MAX_H = 72;
  const bars = [
    {key:'DP',cnt:cnt.DP,bc:'bar-dp',vc:'val-dp',lc:'lbl-dp'},
    {key:'DN',cnt:cnt.DN,bc:'bar-dn',vc:'val-dn',lc:'lbl-dn'},
    {key:'FP',cnt:cnt.FP,bc:'bar-fp',vc:'val-fp',lc:'lbl-fp'},
    {key:'FN',cnt:cnt.FN,bc:'bar-fn',vc:'val-fn',lc:'lbl-fn'},
  ];
  document.getElementById('rs-chart').innerHTML = `
    <div class="bar-chart">
      ${bars.map(b => {
        const bh = b.cnt===0 ? 0 : Math.max(6,Math.round((b.cnt/maxC)*MAX_H));
        return `<div class="bc-col">
          <div class="bc-bar-wrap">
            ${b.cnt>0
              ? `<div class="bc-bar ${b.bc}" style="height:${bh}px;"><span class="bc-bar-val ${b.vc}">${b.cnt}</span></div>`
              : `<div style="height:2px;width:100%;background:#E2E8F0;border-radius:2px;margin-bottom:0;"></div>`
            }
          </div>
          <div class="bc-lbl ${b.lc}">${b.key}</div>
        </div>`;
      }).join('')}
    </div>
    <div class="bc-legend">
      <div class="bc-leg"><div class="bc-leg-dot" style="background:#E53E3E"></div>DP (매우나쁨)</div>
      <div class="bc-leg"><div class="bc-leg-dot" style="background:#FC8181"></div>DN (나쁨)</div>
      <div class="bc-leg"><div class="bc-leg-dot" style="background:#90CDF4"></div>FP (좋음+통증)</div>
      <div class="bc-leg"><div class="bc-leg-dot" style="background:#2B6CB0"></div>FN (아주좋음)</div>
    </div>`;

  /* 분석결과 */
  let an = '';
  if (cnt.DP>0) an = `통증 동반 항목(DP ${cnt.DP})이 있어 전문 상담이 필요합니다. 기능 정상 ${fnPct}%.`;
  else if (cnt.FP>0&&cnt.FN>=cnt.FP) an = `대부분의 동작에서 기능적 움직임을 보입니다 (FN ${fnPct}%). 통증 동반 항목(FP ${cnt.FP})에 집중 관리가 필요합니다.`;
  else if (cnt.FP>0) an = `기능 제한 항목이 다수 있습니다. 트레이너와 함께 개선 프로그램을 진행하세요.`;
  else an = `모든 동작에서 정상적인 기능을 보입니다 (FN 100%). 현재 수준 유지를 권장합니다.`;
  document.getElementById('rs-analysis').innerHTML = `
    <div class="an-text">${an}</div>
    <div class="an-chips">
      ${chipsHtml(cnt)}
      <span class="an-tot">· 총 ${tot}항목</span>
    </div>`;

  /* 15항목 테이블 */
  const rows = SFMA_ITEMS.map(item => {
    const val = h.sheetChecks[item.key]; if (!val) return '';
    return `<tr><td><span style="font-size:10px;color:#A0AEC0;margin-right:6px;">${item.num}.</span>${item.name}</td><td class="tr"><span class="rb ${rbMap[val]||''}">${val}</span></td></tr>`;
  }).join('');
  document.getElementById('detail-table-body').innerHTML = `
    <table class="dtbl">
      <thead><tr><th>패턴</th><th class="tr">${h.round}차<br><span style="font-weight:400;font-size:9px;">${h.date}</span></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

/* ── ② 결과 상세 ── */
function renderDetail() {
  const m = MEMBERS[curMemberIdx], h = m.history[0];
  if (!h) return;
  const gi = gradeInfo(h.total);
  document.getElementById('d-name').textContent = m.name + '님 결과 상세';
  document.getElementById('d-date').textContent = fmtDate(h.date) + ' · 담당: ' + m.trainer;
  document.getElementById('d-score').textContent = h.total;
  const dg = document.getElementById('d-grade');
  dg.textContent = gi.label; dg.className = 'd-grade';

  const sec = document.getElementById('detail-section');
  sec.innerHTML = PAT_GROUPS.map(pg => {
    const cnt = patCnt(h.sheetChecks, pg.keys);
    const score = patScore(cnt); if (score===null) return '';
    const sc = scoreColor(score);
    const barCls = score>=75?'bar-good':score>=60?'bar-warn':'bar-bad';
    const items = pg.keys.filter(k=>h.sheetChecks[k]).map(k=>{
      const v=h.sheetChecks[k];
      return `<span class="ck ${ckMap[v]||''}">${SFMA_ITEMS.find(i=>i.key===k)?.name||k}: ${v}</span>`;
    }).join('');
    return `<div class="detail-item">
      <div class="di-hdr">
        <span class="di-icon">${pg.icon}</span>
        <span class="di-name">${pg.name}</span>
        <span class="di-score" style="color:${sc}">${score}</span>
      </div>
      <div class="di-bar-bg"><div class="di-bar ${barCls}" style="width:${score}%"></div></div>
      <div class="check-row">${items}</div>
    </div>`;
  }).join('');

  if (h.opinion) {
    document.getElementById('opinion-box').style.display = 'block';
    document.getElementById('op-text').textContent = h.opinion;
  }
}

function renderCompare() {
  const m = MEMBERS[curMemberIdx];
  // 회차 칩
  document.getElementById('round-chips').innerHTML = m.history.map((h,i) =>
    `<button class="round-chip ${cmpRounds.includes(i)?'on':''}" onclick="toggleRound(${i})">${h.round}차 (${h.date.slice(2,7).replace('-','/')})</button>`
  ).join('');

  if (!cmpRounds.length) { document.getElementById('compare-body').innerHTML='<div style="text-align:center;color:#A0AEC0;padding:20px;font-size:12px;">회차를 선택하세요</div>'; return; }

  const selHist = cmpRounds.map(i=>m.history[i]);
  const COLS = ['#6B46C1','#4299E1','#48BB78','#ECC94B','#FC8181'];

  const thCols = selHist.map((h,li) => {
    const col = COLS[cmpRounds[li]%COLS.length];
    return `<th class="tr" style="color:${col}">${h.round}차<br><span style="font-weight:400;font-size:9px;">${h.date.slice(0,7)}</span></th>`;
  }).join('');
  const rows = SFMA_ITEMS.map(item => {
    const vals = selHist.map(h=>h.sheetChecks[item.key]||'-');
    if (vals.every(v=>v==='-')) return '';
    const tdCols = vals.map(v=>
      v==='-'?`<td class="tr" style="color:#CBD5E0;">-</td>`:`<td class="tr"><span class="rb ${rbMap[v]||''}">${v}</span></td>`
    ).join('');
    return `<tr><td><span style="font-size:10px;color:#A0AEC0;margin-right:5px;">${item.num}.</span>${item.name}</td>${tdCols}</tr>`;
  }).join('');

  document.getElementById('compare-body').innerHTML = `
    <table class="dtbl" style="font-size:11px;">
      <thead><tr><th>패턴</th>${thCols}</tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}
function toggleRound(idx) {
  if (cmpRounds.includes(idx)) { if (cmpRounds.length===1) return; cmpRounds=cmpRounds.filter(i=>i!==idx); }
  else { cmpRounds.push(idx); cmpRounds.sort((a,b)=>a-b); }
  renderCompare();
}

/* ── ④ 이력 목록 ── */
function renderHistory() {
  const m = MEMBERS[curMemberIdx];
  if (!m.history.length) { document.getElementById('history-body').innerHTML='<div style="text-align:center;color:#A0AEC0;padding:20px;font-size:12px;">측정 이력 없음</div>'; return; }
  const first = m.history[m.history.length-1].total;
  const last  = m.history[0].total;
  const diff  = last - first;
  document.getElementById('history-body').innerHTML = m.history.map((h,i) => {
    const gi = gradeInfo(h.total);
    const cnt = countChecks(h.sheetChecks);
    const prev = m.history[i+1];
    let chg='';
    if (prev) { const d=h.total-prev.total; chg=d>0?`<span style="color:#38A169;">▲+${d}</span>`:d<0?`<span style="color:#E53E3E;">▼${d}</span>`:`<span style="color:#A0AEC0;">→유지</span>`; }
    return `<div class="history-item" onclick="go('detail')">
      <div class="history-num ${i===0?'latest':''}">${h.round}</div>
      <div class="history-info">
        <div class="history-round">${h.round}차 측정 ${i===0?`<span style="font-size:10px;background:#EDE9FE;color:#7B61FF;border-radius:99px;padding:2px 7px;font-weight:700;margin-left:4px;">최근</span>`:''}</div>
        <div class="history-date">${h.date.replace(/-/g,'. ')}</div>
        <div class="history-chips">${chipsHtml(cnt)}</div>
      </div>
      <div class="history-right">
        <span class="history-score">${h.total}</span>
        <span class="history-grade ${gi.cls}">${gi.label}</span>
        <span class="history-change">${chg}</span>
      </div>
    </div>`;
  }).join('') + `<div style="padding:12px 4px;text-align:center;color:#A0AEC0;font-size:11px;font-weight:600;">총 ${m.history.length}회 측정 · ${diff>=0?`+${diff}점 향상`:`${diff}점 변화`}</div>`;
}

/* ══ 초기화 ══ */
cmpRounds = MEMBERS[0].history.map((_,i)=>i);
renderMemberChips();
renderAll();
</script>
