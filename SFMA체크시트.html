<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>SFMA 검사 체크시트</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Noto Sans KR',sans-serif;background:#EEF2F7;color:#1A202C;min-height:100vh;}

    /* ── Header ── */
    .app-header{
      background:#1A365D;color:#fff;padding:13px 20px;
      display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.3);
    }
    .header-left{display:flex;align-items:center;gap:10px;}
    .header-title{font-size:17px;font-weight:900;letter-spacing:-.3px;}
    .save-btn{
      background:#3182CE;color:#fff;border:none;border-radius:10px;
      padding:9px 20px;font-size:14px;font-weight:700;cursor:pointer;
      font-family:'Noto Sans KR',sans-serif;transition:background .15s;
    }
    .save-btn:hover{background:#2B6CB0;}

    /* ── Tab bar ── */
    .tab-bar{
      background:#fff;border-bottom:2px solid #CBD5E0;
      display:flex;overflow-x:auto;scrollbar-width:none;
      position:sticky;top:48px;z-index:100;
    }
    .tab-bar::-webkit-scrollbar{display:none;}
    .tab-btn{
      flex-shrink:0;padding:10px 15px;font-size:11.5px;font-weight:700;
      color:#718096;cursor:pointer;border:none;border-bottom:3px solid transparent;
      background:none;font-family:'Noto Sans KR',sans-serif;transition:all .15s;
      white-space:nowrap;line-height:1.3;text-align:center;
    }
    .tab-btn.active{color:#1A365D;border-bottom-color:#1A365D;background:#F7FAFF;}
    .tab-btn:hover:not(.active){color:#2D3748;background:#F7F9FC;}

    /* ── Subbar ── */
    .subbar{
      background:#F7F9FC;border-bottom:1.5px solid #E2E8F0;
      padding:9px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    }
    .memo-btn{
      background:#fff;border:1.5px solid #CBD5E0;border-radius:8px;
      padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;
      color:#4A5568;font-family:'Noto Sans KR',sans-serif;transition:all .15s;
    }
    .memo-btn.on{background:#EBF8FF;border-color:#90CDF4;color:#2B6CB0;}
    .trainer-wrap{margin-left:auto;display:flex;align-items:center;gap:8px;}
    .trainer-label{font-size:12px;font-weight:700;color:#718096;}
    .trainer-select{
      padding:5px 10px;border:1.5px solid #CBD5E0;border-radius:8px;
      font-size:12px;font-family:'Noto Sans KR',sans-serif;background:#fff;color:#1A202C;
    }

    /* ── Content ── */
    .content{padding:16px 20px 60px;}

    /* ── Top grid (최고위평가) ── */
    .top-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .pat-card{
      background:#fff;border-radius:14px;padding:14px 12px;
      box-shadow:0 1px 6px rgba(0,0,0,.07);border:1.5px solid #E2E8F0;
    }
    .pat-num{font-size:10px;font-weight:700;color:#A0AEC0;margin-bottom:1px;}
    .pat-name{font-size:12.5px;font-weight:800;color:#1A202C;margin-bottom:10px;line-height:1.4;}

    /* ── Symbols ── */
    .sym-row{display:flex;align-items:center;gap:2px;margin-bottom:3px;}
    .sym-row:last-child{margin-bottom:0;}
    .lr-tag{font-size:11px;font-weight:800;color:#718096;width:14px;flex-shrink:0;margin-right:3px;}
    .sym-group{display:flex;gap:5px;}
    .sym-item{
      display:flex;flex-direction:column;align-items:center;cursor:pointer;
      padding:3px 4px;border-radius:7px;transition:background .1s;user-select:none;
    }
    .sym-item:hover{background:#F0F4F8;}
    .sym-item svg{display:block;}
    .sym-lbl{font-size:9px;font-weight:700;margin-top:1px;letter-spacing:.2px;}
    .lbl-fn{color:#2B6CB0;} .lbl-fp{color:#B7791F;} .lbl-dp{color:#C53030;} .lbl-dn{color:#718096;}

    /* ── Detail cards ── */
    .detail-card{
      background:#fff;border-radius:14px;padding:15px 16px;
      box-shadow:0 1px 6px rgba(0,0,0,.07);border:1.5px solid #E2E8F0;margin-bottom:12px;
    }
    .detail-card-inner{display:flex;gap:12px;align-items:flex-start;}
    .photo-box{
      width:72px;height:60px;background:#F0F4F8;border-radius:8px;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;font-size:22px;color:#A0AEC0;
    }
    .detail-body{flex:1;min-width:0;}
    .detail-hdr{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
    .detail-num-badge{
      background:#EBF8FF;color:#2B6CB0;font-size:11px;font-weight:900;
      padding:3px 8px;border-radius:6px;flex-shrink:0;
    }
    .detail-name{font-size:13px;font-weight:700;color:#1A202C;line-height:1.4;}
    .memo-input{
      width:100%;padding:6px 10px;border:1.5px solid #E2E8F0;border-radius:8px;
      font-size:12px;font-family:'Noto Sans KR',sans-serif;color:#4A5568;
      margin-bottom:9px;outline:none;
    }
    .memo-input:focus{border-color:#90CDF4;}
    .sym-rows{display:flex;flex-direction:column;gap:3px;}

    /* Sym sizes: compact for top grid */
    .sz-sm svg{width:26px;height:26px;}
    .sz-md svg{width:30px;height:30px;}

    /* ── Summary bar ── */
    .summary-bar{
      position:fixed;bottom:0;left:0;right:0;
      background:#fff;border-top:1.5px solid #E2E8F0;
      padding:10px 20px;display:flex;align-items:center;gap:12px;
      box-shadow:0 -2px 10px rgba(0,0,0,.07);z-index:100;
    }
    .sum-chip{
      display:flex;align-items:center;gap:5px;padding:4px 10px;
      border-radius:99px;font-size:11px;font-weight:700;
    }
    .sum-dot{width:10px;height:10px;border-radius:50%;}
    .sum-total{margin-left:auto;font-size:12px;font-weight:700;color:#718096;}

    /* ── Toast ── */
    .toast{
      position:fixed;bottom:60px;left:50%;transform:translateX(-50%) translateY(20px);
      background:#1A202C;color:#fff;padding:11px 24px;border-radius:12px;
      font-size:13px;font-weight:700;opacity:0;transition:all .3s;z-index:999;
      white-space:nowrap;pointer-events:none;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    @media(max-width:540px){
      .top-grid{grid-template-columns:1fr;}
      .content{padding:12px 12px 60px;}
    }
  </style>
</head>

  <button class="tab-btn" onclick="switchTab('msflex',this)">다중분절<br>굴곡</button>

  <button class="tab-btn" onclick="switchTab('msrot',this)">다중분절<br>회전</button>

  <button class="tab-btn" onclick="switchTab('squat',this)">오버헤드<br>스쿼트</button>
</div>

<!-- Subbar -->
<div class="subbar">

  <div class="trainer-wrap">

  </div>
</div>

<div class="content" id="content"></div>

  </div>

  </div>
  <div class="sum-total">총 <span id="cnt-total">0</span>항목 입력됨</div>

<div class="toast" id="toast"></div>

let currentTab = 'top';

/* ============ SYMBOLS ============ */
const SYM = {
  FN: { shape:'circle',   color:'#3182CE', unsel:'#A0AEC0', lblCls:'lbl-fn' },
  FP: { shape:'triangle', color:'#D69E2E', unsel:'#A0AEC0', lblCls:'lbl-fp' },
  DP: { shape:'triangle', color:'#E53E3E', unsel:'#A0AEC0', lblCls:'lbl-dp' },
  DN: { shape:'circle',   color:'#718096', unsel:'#A0AEC0', lblCls:'lbl-dn' },
};

function circleSVG(fill, stroke, size){
  return `<svg viewBox="0 0 38 38" width="${size}" height="${size}"><circle cx="19" cy="19" r="15" fill="${fill}" stroke="${stroke}" stroke-width="2.5"/></svg>`;
}
function triSVG(fill, stroke, size){
  return `<svg viewBox="0 0 38 38" width="${size}" height="${size}"><polygon points="19,32 3,8 35,8" fill="${fill}" stroke="${stroke}" stroke-width="2.5" stroke-linejoin="round"/></svg>`;
}

function makeSym(key, stateKey, size){
  const cfg = SYM[key];
  const sel  = sfmaData[stateKey] === key;
  const fill = sel ? cfg.color : '#FFFFFF';
  const strk = sel ? cfg.color : '#CBD5E0';
  const svg  = cfg.shape === 'circle' ? circleSVG(fill, strk, size) : triSVG(fill, strk, size);
  return `<div class="sym-item" onclick="toggleCheck('${stateKey}','${key}')" title="${key}">
    ${svg}
    <span class="sym-lbl ${cfg.lblCls}">${key}</span>
  </div>`;
}

function makeSymRow(id, side, size){
  const k    = side ? `${id}_${side}` : id;
  const tag  = side ? `<span class="lr-tag">${side}</span>` : `<span class="lr-tag"></span>`;
  return `<div class="sym-row">
    ${tag}
    <div class="sym-group">${['FN','FP','DP','DN'].map(s=>makeSym(s,k,size)).join('')}</div>
  </div>`;
}

/* ============ TOGGLE ============ */
function toggleCheck(stateKey, val){
  if(sfmaData[stateKey] === val) delete sfmaData[stateKey];
  else sfmaData[stateKey] = val;
  renderContent();
  updateSummary();
}

/* ============ RENDER: TOP GRID ============ */
function renderTopGrid(patterns){
  return `<div class="top-grid">${patterns.map(p=>`
    <div class="pat-card">
      <div class="pat-num">${p.num}.</div>
      <div class="pat-name">${p.name}</div>
      ${p.bilateral
        ? makeSymRow(p.id,'좌',26) + makeSymRow(p.id,'우',26)
        : makeSymRow(p.id,null,26)
      }
    </div>`).join('')}</div>`;
}

/* ============ RENDER: DETAIL CARDS ============ */
function renderDetailCards(patterns){
  return patterns.map(p=>{
    const memoKey = `${p.id}_memo`;
    const memoVal = memoData[memoKey] || '';
    const memoHtml = showMemo
      ? `<input class="memo-input" placeholder="메모" value="${memoVal}"
           onchange="memoData['${memoKey}']=this.value" />`
      : '';
    const checks = p.bilateral
      ? makeSymRow(p.id,'좌',30) + makeSymRow(p.id,'우',30)
      : makeSymRow(p.id,null,30);
    return `<div class="detail-card">
      <div class="detail-card-inner">
        <div class="photo-box">${p.icon||'🏃'}</div>
        <div class="detail-body">
          <div class="detail-hdr">
            <span class="detail-num-badge">${p.num}</span>
            <span class="detail-name">${p.name}</span>
          </div>
          ${memoHtml}
          <div class="sym-rows">${checks}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ============ RENDER CONTENT ============ */
function renderContent(){
  const patterns = DATA[currentTab];
  document.getElementById('content').innerHTML =
    currentTab === 'top'
      ? renderTopGrid(patterns)
      : renderDetailCards(patterns);
}

/* ============ SWITCH TAB ============ */
function switchTab(tab, btn){
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderContent();
}

/* ============ MEMO TOGGLE ============ */
function toggleMemo(){
  showMemo = !showMemo;
  const btn = document.getElementById('memoBtn');
  btn.classList.toggle('on', showMemo);
  btn.textContent = showMemo ? '📝 메모 보기' : '📝 메모 숨기기';
  renderContent();
}

/* ============ SUMMARY ============ */
function updateSummary(){
  const vals = Object.values(sfmaData);
  const cnt = { FN:0, FP:0, DP:0, DN:0 };
  vals.forEach(v=>{ if(cnt[v]!==undefined) cnt[v]++; });
  document.getElementById('cnt-fn').textContent = cnt.FN;
  document.getElementById('cnt-fp').textContent = cnt.FP;
  document.getElementById('cnt-dp').textContent = cnt.DP;
  document.getElementById('cnt-dn').textContent = cnt.DN;
  document.getElementById('cnt-total').textContent = vals.length;
}

/* ============ SAVE ============ */
function saveData(){
  const trainer = document.getElementById('trainerSel').value;
  const date    = new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'});
  const total   = Object.keys(sfmaData).length;
  const fn      = Object.values(sfmaData).filter(v=>v==='FN').length;
  const fp      = Object.values(sfmaData).filter(v=>v==='FP').length;
  const dp      = Object.values(sfmaData).filter(v=>v==='DP').length;
  const dn      = Object.values(sfmaData).filter(v=>v==='DN').length;

  // LocalStorage 저장
  try {
    const saveObj = { trainer, date, sfmaData: { ...sfmaData }, memoData: { ...memoData } };
    localStorage.setItem('sfma_sheet', JSON.stringify(saveObj));
    showToast(`✅ 저장 완료 · ${trainer} · ${date} · FN:${fn} FP:${fp} DP:${dp} DN:${dn} (총 ${total}항목)`);
  } catch(e) {
    showToast('저장 중 오류가 발생했습니다.');
  }
}

/* ============ LOAD ============ */
function loadSavedData(){
  try {
    const raw = localStorage.getItem('sfma_sheet');
    if(!raw) return;
    const saved = JSON.parse(raw);
    if(saved.sfmaData) Object.assign(sfmaData, saved.sfmaData);
    if(saved.memoData) Object.assign(memoData, saved.memoData);
    if(saved.trainer){
      const sel = document.getElementById('trainerSel');
      for(let opt of sel.options){ if(opt.value===saved.trainer){ sel.value=saved.trainer; break; } }
    }
  } catch(e){}
}

/* ============ TOAST ============ */
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3500);
}

/* ============ INIT ============ */
loadSavedData();
renderContent();
updateSummary();
</script>
</body>
</html>
