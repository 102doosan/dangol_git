<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>내 SFMA 결과</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #F0F4F8; color: #1A202C; min-height: 100vh; }

    /* ─ 로그인 ─ */
    #login-screen {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
      background: linear-gradient(160deg, #1E1A2E 0%, #4A2C8A 60%, #7B61FF 100%);
    }
    .login-logo { text-align: center; margin-bottom: 36px; }
    .login-logo-icon { font-size: 48px; margin-bottom: 8px; }
    .login-logo-title { font-size: 22px; font-weight: 900; color: #fff; }
    .login-logo-sub { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 4px; }
    .login-card {
      background: #fff; border-radius: 20px; padding: 28px 24px;
      width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-card-title { font-size: 15px; font-weight: 800; color: #1A202C; margin-bottom: 16px; }
    .member-btn-list { display: flex; flex-direction: column; gap: 8px; }
    .member-login-btn {
      display: flex; align-items: center; gap: 12px; padding: 12px 14px;
      background: #F7F9FC; border: 1.5px solid #E2E8F0; border-radius: 12px;
      cursor: pointer; transition: all .15s; text-align: left;
    }
    .member-login-btn:hover { border-color: #9B84FF; background: #F5F3FF; }
    .ml-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 900; color: #fff; flex-shrink: 0; }
    .ml-name { font-size: 14px; font-weight: 700; color: #1A202C; }
    .ml-sub { font-size: 11px; color: #A0AEC0; margin-top: 1px; }
    .ml-grade { margin-left: auto; }

    /* ─ 메인 앱 ─ */
    #app { display: none; max-width: 480px; margin: 0 auto; min-height: 100vh; background: #F0F4F8; }

    /* 상단 헤더 */
    .app-header { background: linear-gradient(135deg, #2D1B69, #6B46C1); padding: 44px 20px 24px; color: #fff; position: relative; }
    .header-back { position: absolute; top: 14px; left: 16px; background: rgba(255,255,255,0.15); border: none; color: #fff; border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
    .header-profile { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .h-avatar { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; color: #fff; border: 3px solid rgba(255,255,255,0.4); }
    .h-name { font-size: 19px; font-weight: 900; }
    .h-trainer { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 2px; }
    .h-grade-row { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
    .h-grade-badge { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; }
    .hb-excellent { background: rgba(154,230,180,0.25); color: #9AE6B4; }
    .hb-good      { background: rgba(144,205,244,0.25); color: #90CDF4; }
    .hb-average   { background: rgba(246,224,94,0.25);  color: #F6E05E; }
    .hb-poor      { background: rgba(254,178,178,0.25); color: #FEB2B2; }
    .h-round-tag  { font-size: 11px; color: rgba(255,255,255,0.5); }
    .score-row { display: flex; align-items: flex-end; gap: 6px; }
    .score-big { font-size: 50px; font-weight: 900; line-height: 1; }
    .score-max { font-size: 15px; color: rgba(255,255,255,0.55); padding-bottom: 6px; }
    .score-change { font-size: 13px; font-weight: 700; padding-bottom: 7px; margin-left: 4px; }
    .sc-up   { color: #9AE6B4; }
    .sc-down { color: #FEB2B2; }
    .sc-same { color: rgba(255,255,255,0.5); }

    /* 요약 칩 행 (FN/FP/DP/DN 4개) */
    .summary-chips { display: flex; gap: 6px; margin-top: 12px; }
    .sum-chip { flex: 1; text-align: center; padding: 7px 4px; border-radius: 10px; }
    .sum-chip-val { font-size: 17px; font-weight: 900; }
    .sum-chip-lbl { font-size: 10px; font-weight: 700; margin-top: 1px; }
    .sc-fn { background: rgba(235,248,255,0.18); }
    .sc-fp { background: rgba(255,250,240,0.18); }
    .sc-dp { background: rgba(255,245,245,0.18); }
    .sc-dn { background: rgba(247,250,252,0.18); }

    /* 탭 */
    .app-tabs { display: flex; background: #fff; border-bottom: 2px solid #E2E8F0; position: sticky; top: 0; z-index: 100; }
    .app-tab { flex: 1; padding: 12px 6px; font-size: 12px; font-weight: 700; color: #A0AEC0; text-align: center; cursor: pointer; border: none; background: none; font-family: 'Noto Sans KR', sans-serif; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all .15s; }
    .app-tab.active { color: #6B46C1; border-bottom-color: #6B46C1; }
    .tab-content { display: none; padding: 14px; }
    .tab-content.active { display: block; }

    /* 카드 */
    .ucard { background: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); margin-bottom: 10px; }
    .ucard-title { font-size: 13px; font-weight: 800; color: #1A202C; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

    /* D-day 카드 */
    .dday-card { border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; }
    .dday-ok      { background: linear-gradient(135deg,#1A4731,#276749); }
    .dday-soon    { background: linear-gradient(135deg,#744210,#B7791F); }
    .dday-overdue { background: linear-gradient(135deg,#742A2A,#C53030); }
    .dday-num { font-size: 30px; font-weight: 900; color: #fff; line-height: 1; flex-shrink: 0; }
    .dday-info { flex: 1; }
    .dday-label-top { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.6); margin-bottom: 2px; }
    .dday-date-str { font-size: 14px; font-weight: 900; color: #fff; }
    .dday-sub-str { font-size: 11px; color: rgba(255,255,255,0.65); margin-top: 2px; }

    /* 스코어 요약 4칸 그리드 */
    .score-summary-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 10px; }
    .sscard { background: #fff; border-radius: 12px; padding: 10px 8px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .sscard-val { font-size: 22px; font-weight: 900; }
    .sscard-lbl { font-size: 10px; font-weight: 700; margin-top: 2px; }
    .ss-fn { color: #2B6CB0; }
    .ss-fp { color: #B7791F; }
    .ss-dp { color: #C53030; }
    .ss-dn { color: #718096; }

    /* 패턴 결과 */
    .pat-row { padding: 12px 0; border-bottom: 1px solid #F0F4F8; }
    .pat-row:last-child { border-bottom: none; }
    .pat-top { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
    .pat-icon { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }
    .pat-name { font-size: 13px; font-weight: 700; color: #1A202C; flex: 1; }
    .pat-score-num { font-size: 16px; font-weight: 900; }
    .pat-bar-bg { background: #EDF2F7; border-radius: 99px; height: 7px; overflow: hidden; margin-bottom: 6px; }
    .pat-bar-fill { height: 100%; border-radius: 99px; transition: width .6s ease; }
    .pat-chips { display: flex; gap: 4px; flex-wrap: wrap; }

    /* 체크 심볼 미니 표 */
    .check-mini-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 8px; }
    .check-mini-table th { background: #F7F9FC; padding: 5px 8px; font-weight: 700; color: #718096; text-align: left; border-bottom: 1px solid #E2E8F0; }
    .check-mini-table td { padding: 6px 8px; border-bottom: 1px solid #F0F4F8; color: #2D3748; vertical-align: middle; }
    .check-mini-table tr:last-child td { border-bottom: none; }

    /* 결과 심볼 배지 */
    .rsym { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 6px; display: inline-block; }
    .rsym-fn { background: #EBF8FF; color: #2B6CB0; }
    .rsym-fp { background: #FFFAF0; color: #B7791F; }
    .rsym-dp { background: #FFF5F5; color: #C53030; }
    .rsym-dn { background: #F7FAFC; color: #4A5568; }

    /* chip */
    .chip { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 99px; display: inline-block; }
    .chip-fn { background: #EBF8FF; color: #2B6CB0; }
    .chip-fp { background: #FFFAF0; color: #B7791F; }
    .chip-dp { background: #FFF5F5; color: #C53030; }
    .chip-dn { background: #F7FAFC; color: #4A5568; }

    /* 트렌드 */
    .trend-outer { position: relative; padding-top: 22px; }
    .trend-wrap { display: flex; align-items: flex-end; gap: 8px; height: 90px; }
    .trend-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .trend-bar-wrap { flex: 1; width: 100%; display: flex; align-items: flex-end; }
    .trend-bar { width: 100%; border-radius: 6px 6px 0 0; min-height: 4px; position: relative; }
    .trend-score-lbl { font-size: 10px; font-weight: 900; position: absolute; top: -17px; left: 50%; transform: translateX(-50%); white-space: nowrap; }
    .trend-round-lbl { font-size: 10px; font-weight: 700; color: #718096; }
    .trend-date-lbl { font-size: 9px; color: #CBD5E0; }

    /* 소견 카드 */
    .opinion-card { background: #F9F7FF; border-left: 3px solid #9B84FF; border-radius: 0 12px 12px 0; padding: 10px 12px; font-size: 12px; color: #4A5568; line-height: 1.7; }

    /* 비교 */
    .round-select-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px; }
    .cmp-round-btn { display: inline-flex; align-items: center; gap: 4px; padding: 5px 12px; border-radius: 99px; font-size: 12px; font-weight: 700; border: 1.5px solid #E2E8F0; background: #fff; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; color: #718096; transition: all .15s; }
    .cmp-round-btn.active { background: #6B46C1; border-color: #6B46C1; color: #fff; }
    .cmp-row-u { margin-bottom: 14px; }
    .cmp-row-u:last-child { margin-bottom: 0; }
    .cmp-name-u { font-size: 12px; font-weight: 700; color: #4A5568; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .cmp-bars { display: flex; flex-direction: column; gap: 4px; }
    .cmp-bar-line-u { display: flex; align-items: center; gap: 8px; }
    .cmp-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .cmp-bar-bg-u { flex: 1; background: #EDF2F7; border-radius: 99px; height: 10px; overflow: hidden; }
    .cmp-bar-fill-u { height: 100%; border-radius: 99px; transition: width .6s ease; }
    .cmp-score-u { font-size: 11px; font-weight: 700; width: 24px; text-align: right; }

    /* 이력 */
    .history-item { display: flex; align-items: flex-start; gap: 12px; padding: 14px 0; border-bottom: 1px solid #F0F4F8; cursor: pointer; }
    .history-item:last-child { border-bottom: none; }
    .hi-left { flex: 1; min-width: 0; }
    .hi-round { font-size: 11px; font-weight: 700; color: #A0AEC0; margin-bottom: 3px; }
    .hi-date { font-size: 13px; font-weight: 700; color: #1A202C; margin-bottom: 4px; }
    .hi-opinion { font-size: 11px; color: #718096; line-height: 1.5; }
    .hi-right { text-align: right; flex-shrink: 0; }
    .hi-score { font-size: 22px; font-weight: 900; }
    .hi-grade-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 99px; margin-top: 3px; display: inline-block; }

    /* 등급 배지 */
    .g-excellent { background: #C6F6D5; color: #1A4731; }
    .g-good      { background: #BEE3F8; color: #1A365D; }
    .g-average   { background: #FEFCBF; color: #744210; }
    .g-poor      { background: #FED7D7; color: #742A2A; }

    /* 바텀 시트 */
    .detail-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.5); }
    .detail-overlay.open { display: block; animation: fadeIn .2s; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .detail-sheet { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #fff; border-radius: 20px 20px 0 0; padding: 20px; max-height: 88vh; overflow-y: auto; animation: slideUp .25s ease; }
    @keyframes slideUp { from{transform:translateX(-50%) translateY(40px)} to{transform:translateX(-50%) translateY(0)} }
    .sheet-handle { width: 36px; height: 4px; background: #E2E8F0; border-radius: 99px; margin: 0 auto 16px; }
    .sheet-title { font-size: 15px; font-weight: 900; color: #1A202C; margin-bottom: 3px; }
    .sheet-sub { font-size: 12px; color: #A0AEC0; margin-bottom: 14px; }

    /* 빈 상태 */
    .empty-state { text-align: center; padding: 28px 16px; color: #A0AEC0; }
    .empty-icon { font-size: 32px; margin-bottom: 8px; }
    .empty-text { font-size: 13px; font-weight: 700; }
  </style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen">
  <div class="login-logo">
    <div class="login-logo-icon">🏋️</div>
    <div class="login-logo-title">내 SFMA 결과</div>
    <div class="login-logo-sub">회원을 선택하세요</div>
  </div>
  <div class="login-card">
    <div class="login-card-title">👤 회원 선택</div>
    <div class="member-btn-list" id="member-btn-list"></div>
  </div>
</div>

<!-- 메인 앱 -->
<div id="app">
  <div class="app-header" id="app-header">
    <button class="header-back" onclick="logout()">← 목록</button>
    <div class="header-profile">
      <div class="h-avatar" id="h-avatar"></div>
      <div>
        <div class="h-name" id="h-name"></div>
        <div class="h-trainer" id="h-trainer"></div>
        <div class="h-grade-row">
          <span class="h-grade-badge" id="h-grade-badge"></span>
          <span class="h-round-tag" id="h-round-tag"></span>
        </div>
      </div>
    </div>
    <div class="score-row">
      <div class="score-big" id="h-score">-</div>
      <div class="score-max">/ 100</div>
      <div class="score-change" id="h-change"></div>
    </div>
    <!-- FN/FP/DP/DN 요약 칩 -->
    <div class="summary-chips" id="h-chips"></div>
  </div>

  <div class="app-tabs">
    <button class="app-tab active" onclick="switchTab('overview',this)">📊 현황</button>
    <button class="app-tab" onclick="switchTab('compare',this)">📈 비교</button>
    <button class="app-tab" onclick="switchTab('history',this)">📋 이력</button>
  </div>

  <!-- 현황 탭 -->
  <div class="tab-content active" id="tab-overview">

    <!-- D-day -->
    <div id="dday-wrap"></div>

    <!-- 종합 FN/FP/DP/DN 카드 -->
    <div id="score-grid-wrap"></div>

    <!-- 패턴별 결과 -->
    <div class="ucard">
      <div class="ucard-title">📋 패턴별 SFMA 결과</div>
      <div id="pattern-list"></div>
    </div>

    <!-- 트렌드 (2회차 이상) -->
    <div class="ucard" id="trend-card" style="display:none;">
      <div class="ucard-title">📈 점수 변화 추이</div>
      <div class="trend-outer">
        <div class="trend-wrap" id="trend-bars"></div>
      </div>
    </div>

    <!-- 트레이너 소견 -->
    <div class="ucard" id="opinion-card" style="display:none;">
      <div class="ucard-title">💬 트레이너 소견</div>
      <div class="opinion-card" id="opinion-text"></div>
    </div>

  </div>

  <!-- 비교 탭 -->
  <div class="tab-content" id="tab-compare">
    <div class="ucard">
      <div class="ucard-title">🔀 회차별 패턴 비교</div>
      <div class="round-select-row" id="cmp-round-btns"></div>
      <div id="cmp-chart"></div>
    </div>
  </div>

  <!-- 이력 탭 -->
  <div class="tab-content" id="tab-history">
    <div class="ucard">
      <div class="ucard-title">🗂️ 전체 측정 이력</div>
      <div id="history-list"></div>
    </div>
  </div>
</div>

<!-- 상세 바텀 시트 -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="detail-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="ds-title"></div>
    <div class="sheet-sub" id="ds-sub"></div>
    <div id="ds-body"></div>
  </div>
</div>

<script>
/* ══ 데이터 ══ */
const TODAY_DATE = '2026-03-26';

  top9_좌:'회전 안정성 하지 (좌)', top9_우:'회전 안정성 하지 (우)',
  top10:'회전 안정성 복합',
};

const MEMBERS = [
  { name:'김민준', avatar:'#6B46C1', phone:'1234', trainer:'김트레이너', history:[
    { date:'2026-03-25', round:3, total:76, grade:'양호', opinion:'흉추 회전 제한 지속. 재활운동 병행 권장.',

      sheetChecks:{top1:'FP',top2:'FN',top3_좌:'FP',top3_우:'DN',top4_좌:'FN',top4_우:'FP',top5_좌:'FP',top5_우:'DN',top6:'DP',top7:'FP',top8_좌:'FP',top8_우:'DN',top9_좌:'FP',top9_우:'DN',top10:'DP'} },
    { date:'2024-03-10', round:1, total:52, grade:'주의', opinion:'초기 측정. 코어 안정화 운동 시작 권고.',
      sheetChecks:{top1:'DP',top2:'FP',top3_좌:'DN',top3_우:'DN',top4_좌:'FP',top4_우:'DN',top5_좌:'DP',top5_우:'DN',top6:'DP',top7:'DP',top8_좌:'DN',top8_우:'DN',top9_좌:'DP',top9_우:'DN',top10:'DP'} },
  ]},

const SETTINGS = { defaultDays:90, gradeDays:{excellent:180,good:90,average:60,poor:30}, memberOverride:{} };

/* ══ 헬퍼 ══ */
function gradeInfo(total) {
  if (total >= 90) return { label:'우수', cls:'g-excellent', hCls:'hb-excellent' };
  if (total >= 75) return { label:'양호', cls:'g-good',      hCls:'hb-good' };
  if (total >= 60) return { label:'보통', cls:'g-average',   hCls:'hb-average' };
  return               { label:'주의', cls:'g-poor',       hCls:'hb-poor' };
}
function barColor(score) {
  return score >= 90 ? '#48BB78' : score >= 75 ? '#4299E1' : score >= 60 ? '#ECC94B' : '#FC8181';
}
function scoreColor(score) {
  return score >= 75 ? '#38A169' : score >= 60 ? '#D69E2E' : '#E53E3E';
}
function getReexamDays(m) {
  if (SETTINGS.memberOverride[m.name] != null) return SETTINGS.memberOverride[m.name];
  const h = m.history[0]; if (!h) return SETTINGS.defaultDays;
  const g = gradeInfo(h.total).label;
  return SETTINGS.gradeDays[{우수:'excellent',양호:'good',보통:'average',주의:'poor'}[g]] || SETTINGS.defaultDays;
}
function addDays(d, n) { const dt = new Date(d); dt.setDate(dt.getDate()+n); return dt.toISOString().slice(0,10); }
function daysBetween(a,b) { return Math.round((new Date(b)-new Date(a))/86400000); }
function fmtDate(d) { const [y,m,dd]=d.split('-'); return `${y}년 ${+m}월 ${+dd}일`; }

function countChecks(checks) {
  const c = {FN:0,FP:0,DP:0,DN:0};
  if (!checks) return c;
  Object.values(checks).forEach(v => { if (v in c) c[v]++; });
  return c;
}
function patternCnt(checks, keys) {
  const c = {FN:0,FP:0,DP:0,DN:0};
  keys.forEach(k => { if (checks[k] && checks[k] in c) c[checks[k]]++; });
  return c;
}
function patScore(cnt) {
  const tot = cnt.FN+cnt.FP+cnt.DP+cnt.DN;
  if (!tot) return null;
  return Math.round((cnt.FN*10+cnt.FP*7+cnt.DN*5+cnt.DP*2)/(tot*10)*100);
}
function chipsHtml(c) {
  let h='';
  if(c.FN) h+=`<span class="chip chip-fn">FN ${c.FN}</span>`;
  if(c.FP) h+=`<span class="chip chip-fp">FP ${c.FP}</span>`;
  if(c.DP) h+=`<span class="chip chip-dp">DP ${c.DP}</span>`;
  if(c.DN) h+=`<span class="chip chip-dn">DN ${c.DN}</span>`;
  return h;
}
function symBadge(v) {
  const map = {FN:'rsym-fn',FP:'rsym-fp',DP:'rsym-dp',DN:'rsym-dn'};
  return `<span class="rsym ${map[v]||''}">${v}</span>`;
}

      <div class="sum-chip-lbl" style="color:rgba(255,255,255,0.55)">${lbl}</div>

}

  if (!latest) {

    const num      = left < 0 ? `D+${Math.abs(left)}` : `D-${left}`;
    const sub      = left < 0
      ? `재검사가 ${Math.abs(left)}일 초과되었습니다`
      : left <= 30 ? `곧 재검사 시기입니다 (주기 ${period}일)`

    document.getElementById('dday-wrap').innerHTML = `
      <div class="dday-card ${cls}">
        <div class="dday-num">${num}</div>

      </div>`;
  } else {
    document.getElementById('score-grid-wrap').innerHTML = '';
  }

  /* 패턴별 결과 */
  const patList = document.getElementById('pattern-list');
  if (!latest) {
    patList.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">측정 기록이 없습니다</div></div>`;
  } else {
    patList.innerHTML = PATTERNS.map(p => {
      const cnt   = patternCnt(latest.sheetChecks, p.keys);
      const score = patScore(cnt);
      if (score === null) return '';
      const bc = barColor(score), sc = scoreColor(score);

      // 항목별 체크 결과 행
      const detailRows = p.keys
        .filter(k => latest.sheetChecks[k])
        .map(k => {
          const v = latest.sheetChecks[k];
          // 이전 값 비교
          let changeHtml = '';
          if (prev && prev.sheetChecks[k]) {
            const ORDER = {FN:4,FP:3,DN:2,DP:1};
            const d = ORDER[v] - ORDER[prev.sheetChecks[k]];
            if (d > 0) changeHtml = `<span style="color:#38A169;font-size:10px;margin-left:4px;">▲</span>`;
            else if (d < 0) changeHtml = `<span style="color:#E53E3E;font-size:10px;margin-left:4px;">▼</span>`;
          }
          return `<tr>
            <td style="color:#718096;">${KEY_LABEL[k]||k}</td>
            <td>${symBadge(v)}${changeHtml}</td>

function renderCompare() {
  const m = currentMember;
  const btnWrap = document.getElementById('cmp-round-btns');
  const chartWrap = document.getElementById('cmp-chart');
  if (!m.history.length) { btnWrap.innerHTML=''; chartWrap.innerHTML=`<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-text">측정 기록이 없습니다</div></div>`; return; }

  btnWrap.innerHTML = m.history.map((h,i) => {
    const ds = h.date.slice(2,7).replace('-','/');
    return `<button class="cmp-round-btn ${cmpRounds.includes(i)?'active':''}" onclick="toggleCmpRound(${i})">${h.round}회차 <span style="opacity:.65;font-size:10px;">${ds}</span></button>`;
  }).join('');

  if (!cmpRounds.length) { chartWrap.innerHTML=`<div style="text-align:center;color:#A0AEC0;padding:20px;font-size:13px;">회차를 선택하세요</div>`; return; }

  const COLORS = ['#6B46C1','#4299E1','#48BB78','#ECC94B','#FC8181'];
  const selHist = cmpRounds.map(i => m.history[i]);

  const legend = selHist.map((h,li) => {
    const col = COLORS[cmpRounds[li] % COLORS.length];
    return `<span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#4A5568;margin-right:10px;"><span style="width:10px;height:10px;border-radius:50%;background:${col};display:inline-block;"></span>${h.round}회차 (${h.date.slice(0,7)})</span>`;
  }).join('');

  const rows = PATTERNS.map(p => {
    const scores = selHist.map(h => { const c=patternCnt(h.sheetChecks,p.keys); return patScore(c); });
    if (scores.every(s=>s===null)) return '';
    const bars = scores.map((s,li) => {
      if (s===null) return '';
      const col = COLORS[cmpRounds[li] % COLORS.length];
      const sc = scoreColor(s);
      return `<div class="cmp-bar-line-u">
        <span class="cmp-dot" style="background:${col}"></span>
        <div class="cmp-bar-bg-u"><div class="cmp-bar-fill-u" style="width:${s}%;background:${col}"></div></div>
        <span class="cmp-score-u" style="color:${sc}">${s}</span>
      </div>`;
    }).join('');
    return `<div class="cmp-row-u">
      <div class="cmp-name-u">${p.icon} ${p.name}</div>
      <div class="cmp-bars">${bars}</div>
    </div>`;
  }).join('');

  chartWrap.innerHTML = `<div style="margin-bottom:12px;">${legend}</div>${rows}`;
}

function toggleCmpRound(idx) {
  if (cmpRounds.includes(idx)) {
    if (cmpRounds.length === 1) return;
    cmpRounds = cmpRounds.filter(i=>i!==idx);
  } else {
    cmpRounds.push(idx); cmpRounds.sort((a,b)=>a-b);
  }
  renderCompare();
}

        ? `<div style="font-size:11px;font-weight:700;color:#38A169;">▲ +${d}</div>`
        : d<0
        ? `<div style="font-size:11px;font-weight:700;color:#E53E3E;">▼ ${d}</div>`
        : `<div style="font-size:11px;color:#A0AEC0;">→ 유지</div>`;
    }
    const sc = scoreColor(h.total);
    return `<div class="history-item" onclick="openDetail(${i})">
      <div class="hi-left">
        <div class="hi-round">${h.round}회차</div>
        <div class="hi-date">${fmtDate(h.date)}</div>
        <div style="margin-top:4px;">${chipsHtml(cnt)}</div>
        <div class="hi-opinion" style="margin-top:4px;">${h.opinion}</div>
      </div>
      <div class="hi-right">
        <div class="hi-score" style="color:${sc}">${h.total}</div>
        <div class="hi-grade-badge ${gi.cls}">${gi.label}</div>
        ${chgHtml}
      </div>
    </div>`;
  }).join('');
}

/* ─ 상세 시트 ─ */
function openDetail(idx) {
  const m = currentMember;
  const h = m.history[idx];
  const gi = gradeInfo(h.total);
  const sc = scoreColor(h.total);
  const cnt = countChecks(h.sheetChecks);

  document.getElementById('ds-title').textContent = `${h.round}회차 측정 상세`;
  document.getElementById('ds-sub').textContent = `${fmtDate(h.date)} · 담당: ${m.trainer}`;

  // 전체 집계 카드
  const summaryHtml = `
    <div class="ucard" style="margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:14px;">
        <div>
          <div style="font-size:11px;font-weight:700;color:#A0AEC0;margin-bottom:4px;">종합 점수</div>
          <div style="font-size:34px;font-weight:900;color:${sc}">${h.total}</div>
          <div style="margin-top:6px;">${chipsHtml(cnt)}</div>
        </div>
        <div style="flex:1;text-align:right;">
          <span class="chip ${gi.cls}" style="font-size:14px;padding:6px 14px;">${gi.label}</span>
          <div style="font-size:11px;color:#718096;margin-top:8px;line-height:1.6;text-align:left;">${h.opinion}</div>
        </div>
      </div>
    </div>`;

  // 패턴별 상세
  const patternsHtml = PATTERNS.map(p => {
    const c = patternCnt(h.sheetChecks, p.keys);
    const s = patScore(c); if (s === null) return '';
    const bc = barColor(s), sc2 = scoreColor(s);
    const itemRows = p.keys.filter(k => h.sheetChecks[k]).map(k =>
      `<tr><td style="color:#718096;">${KEY_LABEL[k]||k}</td><td>${symBadge(h.sheetChecks[k])}</td></tr>`
    ).join('');
    return `<div class="pat-row">
      <div class="pat-top">
        <div class="pat-icon">${p.icon}</div>
        <div class="pat-name">${p.name}</div>
        <div class="pat-score-num" style="color:${sc2}">${s}</div>
      </div>
      <div class="pat-bar-bg"><div class="pat-bar-fill" style="width:${s}%;background:${bc}"></div></div>
      <div class="pat-chips">${chipsHtml(c)}</div>
      ${itemRows ? `<table class="check-mini-table" style="margin-top:6px;">${itemRows}</table>` : ''}
    </div>`;
  }).join('');

  document.getElementById('ds-body').innerHTML = summaryHtml + `<div class="ucard"><div class="ucard-title">📋 패턴별 결과</div>${patternsHtml}</div>`;
  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail(e) {
  if (e.target === document.getElementById('detail-overlay'))
    document.getElementById('detail-overlay').classList.remove('open');
}

/* ─ 탭 전환 ─ */
function switchTab(id, btn) {
  document.querySelectorAll('.app-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
}

/* ══ 초기화 ══ */
renderLoginScreen();
</script>
</body>
</html>
