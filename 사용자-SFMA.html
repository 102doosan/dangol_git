<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>SFMA 결과</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #F0F4F8; color: #1A202C; min-height: 100vh; }

    /* ─ 로그인 ─ */
    #login-screen {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
      background: linear-gradient(160deg, #1E1A2E 0%, #4A2C8A 60%, #7B61FF 100%);
    }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo-icon { font-size: 44px; margin-bottom: 8px; }
    .login-logo-title { font-size: 21px; font-weight: 900; color: #fff; }
    .login-logo-sub { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 4px; }
    .login-card { background: #fff; border-radius: 20px; padding: 24px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .login-card-title { font-size: 14px; font-weight: 800; color: #1A202C; margin-bottom: 14px; }
    .member-btn-list { display: flex; flex-direction: column; gap: 8px; }
    .member-login-btn { display: flex; align-items: center; gap: 12px; padding: 11px 14px; background: #F7F9FC; border: 1.5px solid #E2E8F0; border-radius: 12px; cursor: pointer; transition: all .15s; }
    .member-login-btn:hover { border-color: #9B84FF; background: #F5F3FF; }
    .ml-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; color: #fff; flex-shrink: 0; }
    .ml-name { font-size: 14px; font-weight: 700; color: #1A202C; }
    .ml-sub { font-size: 11px; color: #A0AEC0; margin-top: 1px; }
    .ml-grade { margin-left: auto; }

    /* ─ 앱 ─ */
    #app { display: none; max-width: 520px; margin: 0 auto; min-height: 100vh; background: #F0F4F8; }

    /* 헤더 */
    .app-header { background: linear-gradient(135deg, #2D1B69, #6B46C1); padding: 44px 18px 20px; color: #fff; position: relative; }
    .header-back { position: absolute; top: 12px; left: 14px; background: rgba(255,255,255,0.15); border: none; color: #fff; border-radius: 8px; padding: 5px 11px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
    .header-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .h-avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; color: #fff; border: 3px solid rgba(255,255,255,0.35); flex-shrink: 0; }
    .h-name { font-size: 18px; font-weight: 900; }
    .h-trainer { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 2px; }
    .h-grade-row { display: flex; align-items: center; gap: 7px; margin-top: 4px; }
    .h-grade-badge { display: inline-block; padding: 2px 9px; border-radius: 99px; font-size: 11px; font-weight: 700; }
    .hb-excellent { background: rgba(154,230,180,0.25); color: #9AE6B4; }
    .hb-good      { background: rgba(144,205,244,0.25); color: #90CDF4; }
    .hb-average   { background: rgba(246,224,94,0.25);  color: #F6E05E; }
    .hb-poor      { background: rgba(254,178,178,0.25); color: #FEB2B2; }
    .h-round-tag  { font-size: 11px; color: rgba(255,255,255,0.5); }
    .score-row { display: flex; align-items: flex-end; gap: 5px; }
    .score-big { font-size: 46px; font-weight: 900; line-height: 1; }
    .score-max { font-size: 14px; color: rgba(255,255,255,0.5); padding-bottom: 5px; }
    .score-change { font-size: 13px; font-weight: 700; padding-bottom: 5px; margin-left: 4px; }
    .sc-up   { color: #9AE6B4; }
    .sc-down { color: #FEB2B2; }
    .sc-same { color: rgba(255,255,255,0.5); }

    /* 탭 */
    .app-tabs { display: flex; background: #fff; border-bottom: 2px solid #E2E8F0; position: sticky; top: 0; z-index: 100; }
    .app-tab { flex: 1; padding: 12px 6px; font-size: 12px; font-weight: 700; color: #A0AEC0; text-align: center; cursor: pointer; border: none; background: none; font-family: 'Noto Sans KR', sans-serif; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all .15s; }
    .app-tab.active { color: #6B46C1; border-bottom-color: #6B46C1; }
    .tab-content { display: none; padding: 14px; }
    .tab-content.active { display: block; }

    /* 카드 */
    .ucard { background: #fff; border-radius: 14px; padding: 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); margin-bottom: 10px; }
    .ucard-title { font-size: 13px; font-weight: 800; color: #1A202C; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

    /* D-day */
    .dday-card { border-radius: 12px; padding: 13px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
    .dday-ok      { background: linear-gradient(135deg,#1A4731,#276749); }
    .dday-soon    { background: linear-gradient(135deg,#744210,#B7791F); }
    .dday-overdue { background: linear-gradient(135deg,#742A2A,#C53030); }
    .dday-num { font-size: 26px; font-weight: 900; color: #fff; flex-shrink: 0; }
    .dday-info { flex: 1; }
    .dday-top { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.6); margin-bottom: 2px; }
    .dday-date-str { font-size: 13px; font-weight: 900; color: #fff; }
    .dday-sub-str { font-size: 11px; color: rgba(255,255,255,0.65); margin-top: 1px; }

    /* ── 결과 섹션 : 차트 + 분석 ── */
    .result-section { background: #fff; border-radius: 14px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); margin-bottom: 10px; overflow: visible; }
    .result-header { background: #2C3E6B; color: #fff; padding: 10px 16px; font-size: 13px; font-weight: 800; border-radius: 14px 14px 0 0; }

    /* 차트+분석 2열 */
    .result-body { display: grid; grid-template-columns: 1fr 1fr; }
    @media (max-width: 400px) { .result-body { grid-template-columns: 1fr; } }
    .result-chart-col { padding: 16px; border-right: 1px solid #F0F4F8; }
    .result-analysis-col { padding: 16px; }

    /* 막대 차트 */
    .bar-chart-wrap { display: flex; align-items: flex-end; gap: 10px; height: 120px; padding-bottom: 4px; padding-top: 24px; }
    .bc-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
    .bc-bar-wrap { flex: 1; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
    .bc-bar { width: 100%; border-radius: 5px 5px 0 0; min-height: 0; transition: height .6s ease; position: relative; }
    .bc-val { font-size: 13px; font-weight: 900; position: absolute; top: -20px; left: 50%; transform: translateX(-50%); white-space: nowrap; }
    .bc-zero { font-size: 12px; font-weight: 900; color: #A0AEC0; }
    .bc-lbl { font-size: 11px; font-weight: 800; }
    .bc-dp { background: #E53E3E; } .bc-val-dp { color: #E53E3E; }
    .bc-dn { background: #FC8181; } .bc-val-dn { color: #FC8181; }
    .bc-fp { background: #90CDF4; } .bc-val-fp { color: #4299E1; }
    .bc-fn { background: #2B6CB0; } .bc-val-fn { color: #2B6CB0; }
    .bc-lbl-dp { color: #E53E3E; } .bc-lbl-dn { color: #FC8181; }
    .bc-lbl-fp { color: #4299E1; } .bc-lbl-fn { color: #2B6CB0; }

    /* 범례 */
    .bc-legend { margin-top: 12px; display: flex; flex-direction: column; gap: 4px; }
    .bc-leg-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #4A5568; }
    .bc-leg-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    /* 분석결과 */
    .analysis-text { font-size: 12px; color: #2D3748; line-height: 1.75; margin-bottom: 12px; }
    .analysis-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
    .an-chip { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 99px; }
    .an-fn { background: #EBF8FF; color: #2B6CB0; }
    .an-fp { background: #FFFAF0; color: #B7791F; }
    .an-dp { background: #FFF5F5; color: #C53030; }
    .an-dn { background: #F7FAFC; color: #4A5568; }
    .an-total { font-size: 11px; color: #A0AEC0; }

    /* ── 패턴별 상세 테이블 ── */
    .detail-table-wrap { background: #fff; border-radius: 14px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); margin-bottom: 10px; overflow: hidden; }
    .detail-table-header { background: #2C3E6B; color: #fff; padding: 10px 16px; font-size: 13px; font-weight: 800; display: flex; align-items: center; justify-content: space-between; }
    .detail-table-round { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.7); }
    .dtbl { width: 100%; border-collapse: collapse; font-size: 12px; }
    .dtbl th { background: #F7F9FC; padding: 8px 14px; font-weight: 800; color: #718096; font-size: 11px; text-align: left; border-bottom: 1px solid #E2E8F0; }
    .dtbl th.th-right { text-align: right; }
    .dtbl td { padding: 9px 14px; border-bottom: 1px solid #F0F4F8; color: #2D3748; vertical-align: middle; }
    .dtbl tr:last-child td { border-bottom: none; }
    .dtbl td.td-right { text-align: right; }
    .dtbl tr:hover td { background: #F9F7FF; }
    .result-badge { font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 6px; display: inline-block; }
    .rb-fn { background: #EBF8FF; color: #2B6CB0; }
    .rb-fp { background: #FFFAF0; color: #B7791F; }
    .rb-dp { background: #FFF5F5; color: #C53030; }
    .rb-dn { background: #F7FAFC; color: #4A5568; }

    /* 트렌드 */
    .trend-outer { position: relative; padding-top: 20px; }
    .trend-wrap { display: flex; align-items: flex-end; gap: 8px; height: 86px; }
    .trend-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .trend-bar-wrap { flex: 1; width: 100%; display: flex; align-items: flex-end; }
    .trend-bar { width: 100%; border-radius: 5px 5px 0 0; min-height: 4px; position: relative; }
    .trend-score-lbl { font-size: 10px; font-weight: 900; position: absolute; top: -17px; left: 50%; transform: translateX(-50%); white-space: nowrap; }
    .trend-round-lbl { font-size: 10px; font-weight: 700; color: #718096; }
    .trend-date-lbl { font-size: 9px; color: #CBD5E0; }

    /* 비교 */
    .round-select-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px; }
    .cmp-round-btn { display: inline-flex; align-items: center; gap: 4px; padding: 5px 12px; border-radius: 99px; font-size: 12px; font-weight: 700; border: 1.5px solid #E2E8F0; background: #fff; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; color: #718096; transition: all .15s; }
    .cmp-round-btn.active { background: #6B46C1; border-color: #6B46C1; color: #fff; }

    /* 이력 */
    .history-item { display: flex; align-items: flex-start; gap: 12px; padding: 13px 0; border-bottom: 1px solid #F0F4F8; cursor: pointer; }
    .history-item:last-child { border-bottom: none; }
    .hi-left { flex: 1; min-width: 0; }
    .hi-round { font-size: 11px; font-weight: 700; color: #A0AEC0; margin-bottom: 2px; }
    .hi-date { font-size: 13px; font-weight: 700; color: #1A202C; margin-bottom: 4px; }
    .hi-chips { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 4px; }
    .hi-opinion { font-size: 11px; color: #718096; line-height: 1.5; }
    .hi-right { text-align: right; flex-shrink: 0; }
    .hi-score { font-size: 22px; font-weight: 900; }
    .hi-grade-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 99px; margin-top: 3px; display: inline-block; }

    /* 등급 배지 */
    .g-excellent { background: #C6F6D5; color: #1A4731; }
    .g-good      { background: #BEE3F8; color: #1A365D; }
    .g-average   { background: #FEFCBF; color: #744210; }
    .g-poor      { background: #FED7D7; color: #742A2A; }

    /* 소견 */
    .opinion-card { background: #F9F7FF; border-left: 3px solid #9B84FF; border-radius: 0 10px 10px 0; padding: 10px 12px; font-size: 12px; color: #4A5568; line-height: 1.7; }

    /* 바텀 시트 */
    .detail-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.5); }
    .detail-overlay.open { display: block; animation: fadeIn .2s; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .detail-sheet { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 520px; background: #fff; border-radius: 20px 20px 0 0; padding: 18px; max-height: 88vh; overflow-y: auto; animation: slideUp .25s ease; }
    @keyframes slideUp { from{transform:translateX(-50%) translateY(40px)} to{transform:translateX(-50%) translateY(0)} }
    .sheet-handle { width: 36px; height: 4px; background: #E2E8F0; border-radius: 99px; margin: 0 auto 14px; }
    .sheet-title { font-size: 15px; font-weight: 900; color: #1A202C; margin-bottom: 3px; }
    .sheet-sub { font-size: 12px; color: #A0AEC0; margin-bottom: 14px; }

    .empty-state { text-align: center; padding: 28px 16px; color: #A0AEC0; }
    .empty-icon { font-size: 30px; margin-bottom: 8px; }
    .empty-text { font-size: 13px; font-weight: 700; }
  </style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen">
  <div class="login-logo">
    <div class="login-logo-icon">🧠</div>
    <div class="login-logo-title">SFMA 결과</div>
    <div class="login-logo-sub">기능동작검사 · 회원을 선택하세요</div>
  </div>
  <div class="login-card">
    <div class="login-card-title">👤 회원 선택</div>
    <div class="member-btn-list" id="member-btn-list"></div>
    <div style="margin-top:14px;padding-top:14px;border-top:1px solid #E2E8F0;text-align:center;">
      <div style="font-size:11px;color:#A0AEC0;margin-bottom:8px;">다른 검사 결과 보기</div>
      <a href="사용자-CSMI.html" style="display:inline-flex;align-items:center;gap:6px;padding:8px 18px;background:#E6FFFA;color:#2C7A7B;border-radius:10px;font-size:13px;font-weight:700;text-decoration:none;">💪 CSMI 결과 →</a>
    </div>
  </div>
</div>

<!-- 메인 앱 -->
<div id="app">
  <div class="app-header">
    <button class="header-back" onclick="logout()">← 목록</button>
    <div class="header-row">
      <div class="h-avatar" id="h-avatar"></div>
      <div>
        <div class="h-name" id="h-name"></div>
        <div class="h-trainer" id="h-trainer"></div>
        <div class="h-grade-row">
          <span class="h-grade-badge" id="h-grade-badge"></span>
          <span class="h-round-tag" id="h-round-tag"></span>
        </div>
      </div>
    </div>
    <div class="score-row">
      <div class="score-big" id="h-score">-</div>
      <div class="score-max">/ 100</div>
      <div class="score-change" id="h-change"></div>
    </div>
  </div>

  <div class="app-tabs">
    <button class="app-tab active" onclick="switchTab('overview',this)">📊 현황</button>
    <button class="app-tab" onclick="switchTab('compare',this)">📈 비교</button>
    <button class="app-tab" onclick="switchTab('history',this)">📋 이력</button>
  </div>

  <!-- 현황 탭 -->
  <div class="tab-content active" id="tab-overview">
    <div id="dday-wrap"></div>

    <!-- 결과 차트 -->
    <div class="result-section" id="result-section">
      <div class="result-header" id="result-header"></div>
      <div id="result-chart" style="padding:12px 14px;"></div>
    </div>

    <!-- 분석결과 -->
    <div class="result-section" id="result-analysis-section" style="margin-top:0;">
      <div class="result-header">분석결과</div>
      <div id="result-analysis" style="padding:12px 14px;"></div>
    </div>

    <!-- 패턴별 상세 테이블 -->
    <div class="detail-table-wrap" id="detail-table-wrap">
      <div class="detail-table-header">
        <span>최고위평가 패턴별 상세 비교</span>
        <span class="detail-table-round" id="detail-table-round"></span>
      </div>
      <div id="detail-table-body"></div>
    </div>

    <!-- 점수 트렌드 -->
    <div class="ucard" id="trend-card" style="display:none;">
      <div class="ucard-title">📈 점수 변화 추이</div>
      <div class="trend-outer">
        <div class="trend-wrap" id="trend-bars"></div>
      </div>
    </div>

    <!-- 트레이너 소견 -->
    <div class="ucard" id="opinion-card" style="display:none;">
      <div class="ucard-title">💬 트레이너 소견</div>
      <div class="opinion-card" id="opinion-text"></div>
    </div>
  </div>

  <!-- 비교 탭 -->
  <div class="tab-content" id="tab-compare">
    <div class="ucard">
      <div class="ucard-title">🔀 회차별 패턴 비교</div>
      <div class="round-select-row" id="cmp-round-btns"></div>
      <div id="cmp-chart"></div>
    </div>
  </div>

  <!-- 이력 탭 -->
  <div class="tab-content" id="tab-history">
    <div class="ucard">
      <div class="ucard-title">🗂️ 전체 측정 이력</div>
      <div id="history-list"></div>
    </div>
  </div>
</div>

<!-- 바텀 시트 (이력 상세) -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="detail-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="ds-title"></div>
    <div class="sheet-sub" id="ds-sub"></div>
    <div id="ds-body"></div>
  </div>
</div>

  { icon:'🦶', name:'회전 안정성',        keys:['top8_좌','top8_우','top9_좌','top9_우','top10'] },

const MEMBERS = [

const SETTINGS = { defaultDays:90, gradeDays:{excellent:180,good:90,average:60,poor:30}, memberOverride:{} };

/* ══ 헬퍼 ══ */
function gradeInfo(total) {
  if (total >= 90) return { label:'우수', cls:'g-excellent', hCls:'hb-excellent' };
  if (total >= 75) return { label:'양호', cls:'g-good',      hCls:'hb-good' };
  if (total >= 60) return { label:'보통', cls:'g-average',   hCls:'hb-average' };
  return               { label:'주의', cls:'g-poor',       hCls:'hb-poor' };
}
function scoreColor(s) { return s >= 75 ? '#38A169' : s >= 60 ? '#D69E2E' : '#E53E3E'; }
function getReexamDays(m) {
  if (SETTINGS.memberOverride[m.name] != null) return SETTINGS.memberOverride[m.name];
  const h = m.history[0]; if (!h) return SETTINGS.defaultDays;
  const gmap = {우수:'excellent',양호:'good',보통:'average',주의:'poor'};
  return SETTINGS.gradeDays[gmap[gradeInfo(h.total).label]] || SETTINGS.defaultDays;
}
function addDays(d,n) { const dt=new Date(d); dt.setDate(dt.getDate()+n); return dt.toISOString().slice(0,10); }
function daysBetween(a,b) { return Math.round((new Date(b)-new Date(a))/86400000); }
function fmtDate(d) { const [y,m,dd]=d.split('-'); return `${y}년 ${+m}월 ${+dd}일`; }

function countChecks(checks) {
  const c = {FN:0,FP:0,DP:0,DN:0};
  if (!checks) return c;
  Object.values(checks).forEach(v => { if (v in c) c[v]++; });
  return c;
}
function patCnt(checks, keys) {
  const c={FN:0,FP:0,DP:0,DN:0};
  keys.forEach(k => { if (checks[k] && checks[k] in c) c[checks[k]]++; });
  return c;
}
function patScore(cnt) {
  const t=cnt.FN+cnt.FP+cnt.DP+cnt.DN;
  return t ? Math.round((cnt.FN*10+cnt.FP*7+cnt.DN*5+cnt.DP*2)/(t*10)*100) : null;
}
function chipsHtml(c) {
  let h='';
  if(c.FN) h+=`<span style="font-size:10px;font-weight:700;background:#EBF8FF;color:#2B6CB0;padding:2px 6px;border-radius:99px;display:inline-block;">FN ${c.FN}</span>`;
  if(c.FP) h+=`<span style="font-size:10px;font-weight:700;background:#FFFAF0;color:#B7791F;padding:2px 6px;border-radius:99px;display:inline-block;">FP ${c.FP}</span>`;
  if(c.DP) h+=`<span style="font-size:10px;font-weight:700;background:#FFF5F5;color:#C53030;padding:2px 6px;border-radius:99px;display:inline-block;">DP ${c.DP}</span>`;
  if(c.DN) h+=`<span style="font-size:10px;font-weight:700;background:#F7FAFC;color:#4A5568;padding:2px 6px;border-radius:99px;display:inline-block;">DN ${c.DN}</span>`;
  return h;
}

  document.getElementById('h-grade-badge').textContent = `${gi.label} 등급`;
  document.getElementById('h-round-tag').textContent = `${h.round}회차`;

  }
}

/* ─ 현황 탭 ─ */
function renderOverview() {
  const m = currentMember, latest = m.history[0];

  /* D-day */
  if (latest) {
    const period = getReexamDays(m);
    const next = m.nextDate || addDays(latest.date, period);
    const left = daysBetween(TODAY_DATE, next);
    const cls = left<0?'dday-overdue':left<=30?'dday-soon':'dday-ok';
    const num = left<0?`D+${Math.abs(left)}`:`D-${left}`;
    const sub = left<0?`재검사 ${Math.abs(left)}일 초과`
      :left<=30?`재검사 시기가 다가오고 있습니다 (주기 ${period}일)`
               :`다음 측정까지 ${left}일 남음 (주기 ${period}일)`;
    document.getElementById('dday-wrap').innerHTML = `
      <div class="dday-card ${cls}">
        <div class="dday-num">${num}</div>
        <div class="dday-info">
          <div class="dday-top">다음 SFMA 측정 예정일</div>
          <div class="dday-date-str">${fmtDate(next)}</div>
          <div class="dday-sub-str">${sub}</div>
        </div>
      </div>`;
  } else {
    document.getElementById('dday-wrap').innerHTML = '';
  }

  if (!latest) {
    document.getElementById('result-section').style.display = 'none';
    document.getElementById('result-analysis-section').style.display = 'none';
    document.getElementById('detail-table-wrap').style.display = 'none';
    return;
  }

  const cnt = countChecks(latest.sheetChecks);
  const total_items = cnt.FN + cnt.FP + cnt.DP + cnt.DN;

  /* 결과 헤더 */
  document.getElementById('result-header').textContent = `결과 · ${latest.round}차 (${latest.date})`;

  /* 막대 차트 */
  const maxCnt = Math.max(cnt.DP, cnt.DN, cnt.FP, cnt.FN, 1);
  const BAR_H = 90; // px
  const bars = [
    { key:'DP', cnt:cnt.DP, barCls:'bc-dp', valCls:'bc-val-dp', lblCls:'bc-lbl-dp' },
    { key:'DN', cnt:cnt.DN, barCls:'bc-dn', valCls:'bc-val-dn', lblCls:'bc-lbl-dn' },
    { key:'FP', cnt:cnt.FP, barCls:'bc-fp', valCls:'bc-val-fp', lblCls:'bc-lbl-fp' },
    { key:'FN', cnt:cnt.FN, barCls:'bc-fn', valCls:'bc-val-fn', lblCls:'bc-lbl-fn' },
  ];
  const chartHtml = `
    <div class="bar-chart-wrap">
      ${bars.map(b => {
        const h = b.cnt === 0 ? 0 : Math.max(8, Math.round((b.cnt / maxCnt) * BAR_H));
        return `<div class="bc-col">
          <div class="bc-bar-wrap">
            ${b.cnt > 0
              ? `<div class="bc-bar ${b.barCls}" style="height:${h}px;">
                   <span class="bc-val ${b.valCls}">${b.cnt}</span>
                 </div>`
              : `<div style="height:2px;width:100%;background:#E2E8F0;border-radius:2px;"></div>`
            }
          </div>
          <div class="bc-lbl ${b.lblCls}">${b.key}</div>
        </div>`;
      }).join('')}
    </div>
    <div class="bc-legend">
      <div class="bc-leg-item"><div class="bc-leg-dot" style="background:#E53E3E;"></div>DP (매우나쁨)</div>
      <div class="bc-leg-item"><div class="bc-leg-dot" style="background:#FC8181;"></div>DN (나쁨)</div>
      <div class="bc-leg-item"><div class="bc-leg-dot" style="background:#90CDF4;"></div>FP (좋음+통증)</div>
      <div class="bc-leg-item"><div class="bc-leg-dot" style="background:#2B6CB0;"></div>FN (아주좋음)</div>
    </div>`;
  document.getElementById('result-chart').innerHTML = chartHtml;

  /* 분석결과 자동 생성 */
  const fnPct = Math.round((cnt.FN / total_items) * 100);
  const dpPct = Math.round(((cnt.DP + cnt.DN) / total_items) * 100);
  let analysisText = '';
  if (cnt.DP > 0) {
    analysisText = `통증을 동반한 항목(DP ${cnt.DP})이 확인되어 전문 트레이너 상담이 필요합니다. 기능 정상 항목은 ${fnPct}%입니다.`;
  } else if (cnt.FP > 0 && cnt.FN >= cnt.FP) {
    analysisText = `대부분의 동작에서 기능적 움직임을 보입니다 (FN ${fnPct}%). 통증 동반 항목(FP ${cnt.FP})에 집중 관리가 필요합니다.`;
  } else if (cnt.FN > 0 && cnt.FP === 0 && cnt.DP === 0 && cnt.DN === 0) {
    analysisText = `모든 동작에서 정상적인 기능을 보입니다 (FN 100%). 현재 수준 유지를 권장합니다.`;
  } else {
    analysisText = `기능 제한 항목이 다수 발견되었습니다. 체계적인 운동 프로그램을 통한 개선이 권장됩니다.`;
  }

  document.getElementById('result-analysis').innerHTML = `
    <div class="analysis-text">${analysisText}</div>
    <div class="analysis-chips">
      ${cnt.FN ? `<span class="an-chip an-fn">FN ${cnt.FN}</span>` : ''}
      ${cnt.FP ? `<span class="an-chip an-fp">FP ${cnt.FP}</span>` : ''}
      ${cnt.DP ? `<span class="an-chip an-dp">DP ${cnt.DP}</span>` : ''}
      ${cnt.DN ? `<span class="an-chip an-dn">DN ${cnt.DN}</span>` : ''}
      <span class="an-total">· 총 ${total_items}항목</span>
    </div>`;

  /* 패턴별 상세 테이블 */
  document.getElementById('detail-table-round').textContent = `${latest.round}차  ${latest.date}`;
  const rbMap = { FN:'rb-fn', FP:'rb-fp', DP:'rb-dp', DN:'rb-dn' };
  const rows = SFMA_ITEMS.map(item => {
    const val = latest.sheetChecks[item.key];
    if (!val) return '';
    return `<tr>
      <td><span style="font-size:11px;color:#A0AEC0;margin-right:6px;">${item.num}.</span>${item.name}</td>
      <td class="td-right"><span class="result-badge ${rbMap[val]||''}">${val}</span></td>
    </tr>`;
  }).join('');
  document.getElementById('detail-table-body').innerHTML = `
    <table class="dtbl">
      <thead><tr><th>패턴</th><th class="th-right">${latest.round}차<br><span style="font-weight:400;font-size:10px;">${latest.date}</span></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;

  /* 트렌드 */
  const trendCard = document.getElementById('trend-card');
  if (m.history.length >= 2) {
    trendCard.style.display = 'block';
    const sorted = [...m.history].reverse();
    const COLS = ['#6B46C1','#4299E1','#48BB78','#ECC94B','#FC8181'];
    document.getElementById('trend-bars').innerHTML = sorted.map((h,i) => {
      const col = COLS[i % COLS.length];
      const ds = h.date.slice(2,7).replace('-','/');

        <div class="trend-bar-wrap">
          <div class="trend-bar" style="height:${h.total}%;background:${col}">

        <div class="trend-round-lbl">${h.round}회차</div>
        <div class="trend-date-lbl">${ds}</div>
      </div>`;
    }).join('');
  } else {
    trendCard.style.display = 'none';
  }

  /* 소견 */
  if (latest.opinion) {
    document.getElementById('opinion-card').style.display = 'block';
    document.getElementById('opinion-text').textContent = latest.opinion;
  } else {
    document.getElementById('opinion-card').style.display = 'none';
  }
}

    btnWrap.innerHTML=''; chartWrap.innerHTML=`<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-text">측정 기록 없음</div></div>`; return;
  }
  btnWrap.innerHTML = m.history.map((h,i) =>
    `<button class="cmp-round-btn ${cmpRounds.includes(i)?'active':''}" onclick="toggleCmpRound(${i})">${h.round}회차 <span style="opacity:.65;font-size:10px;">${h.date.slice(2,7).replace('-','/')}</span></button>`
  ).join('');

  if (!cmpRounds.length) { chartWrap.innerHTML=`<div style="text-align:center;color:#A0AEC0;padding:20px;font-size:13px;">회차를 선택하세요</div>`; return; }

  const COLS = ['#6B46C1','#4299E1','#48BB78','#ECC94B','#FC8181'];
  const selHist = cmpRounds.map(i => m.history[i]);

  // 헤더 열 (회차들)
  const thCols = selHist.map((h,li) => {
    const col = COLS[cmpRounds[li] % COLS.length];
    return `<th class="th-right" style="color:${col}">${h.round}차<br><span style="font-weight:400;font-size:10px;">${h.date.slice(0,7)}</span></th>`;
  }).join('');

  // 행 (각 SFMA 항목)
  const rbMap = { FN:'rb-fn', FP:'rb-fp', DP:'rb-dp', DN:'rb-dn' };
  const rows = SFMA_ITEMS.map(item => {
    const vals = selHist.map(h => h.sheetChecks[item.key] || '-');
    if (vals.every(v => v==='-')) return '';
    const tdCols = vals.map(v => {
      if (v==='-') return `<td class="td-right" style="color:#CBD5E0;">-</td>`;
      return `<td class="td-right"><span class="result-badge ${rbMap[v]||''}">${v}</span></td>`;
    }).join('');
    return `<tr><td><span style="font-size:11px;color:#A0AEC0;margin-right:6px;">${item.num}.</span>${item.name}</td>${tdCols}</tr>`;
  }).join('');

  chartWrap.innerHTML = `
    <table class="dtbl">
      <thead><tr><th>패턴</th>${thCols}</tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function toggleCmpRound(idx) {
  if (cmpRounds.includes(idx)) {
    if (cmpRounds.length === 1) return;
    cmpRounds = cmpRounds.filter(i=>i!==idx);
  } else { cmpRounds.push(idx); cmpRounds.sort((a,b)=>a-b); }
  renderCompare();
}

/* ─ 이력 탭 ─ */
function renderHistory() {
  const m = currentMember, wrap = document.getElementById('history-list');
  if (!m.history.length) { wrap.innerHTML=`<div class="empty-state"><div class="empty-icon">🗂️</div><div class="empty-text">측정 이력 없음</div></div>`; return; }
  wrap.innerHTML = m.history.map((h,i) => {
    const gi = gradeInfo(h.total);
    const prev = m.history[i+1];
    const cnt = countChecks(h.sheetChecks);
    const sc = scoreColor(h.total);
    let chg = '';
    if (prev) { const d=h.total-prev.total; chg=d>0?`<div style="font-size:11px;font-weight:700;color:#38A169;">▲ +${d}</div>`:d<0?`<div style="font-size:11px;font-weight:700;color:#E53E3E;">▼ ${d}</div>`:`<div style="font-size:11px;color:#A0AEC0;">→ 유지</div>`; }
    return `<div class="history-item" onclick="openDetail(${i})">
      <div class="hi-left">
        <div class="hi-round">${h.round}회차</div>
        <div class="hi-date">${fmtDate(h.date)}</div>
        <div class="hi-chips">${chipsHtml(cnt)}</div>
        <div class="hi-opinion">${h.opinion}</div>
      </div>
      <div class="hi-right">
        <div class="hi-score" style="color:${sc}">${h.total}</div>
        <div class="hi-grade-badge ${gi.cls}">${gi.label}</div>
        ${chg}
      </div>
    </div>`;
  }).join('');
}

/* ─ 상세 시트 ─ */
function openDetail(idx) {
  const m = currentMember, h = m.history[idx];
  const gi = gradeInfo(h.total), sc = scoreColor(h.total);
  const cnt = countChecks(h.sheetChecks);
  const tot = cnt.FN+cnt.FP+cnt.DP+cnt.DN;
  const fnPct = Math.round((cnt.FN/tot)*100);
  const rbMap = { FN:'rb-fn', FP:'rb-fp', DP:'rb-dp', DN:'rb-dn' };

  document.getElementById('ds-title').textContent = `${h.round}회차 측정 상세`;
  document.getElementById('ds-sub').textContent = `${fmtDate(h.date)} · 담당: ${m.trainer}`;

  // 차트 (바텀시트용 소형)
  const maxCnt2 = Math.max(cnt.DP,cnt.DN,cnt.FP,cnt.FN,1);
  const bars2 = [
    {key:'DP',cnt:cnt.DP,barCls:'bc-dp',valCls:'bc-val-dp',lblCls:'bc-lbl-dp'},
    {key:'DN',cnt:cnt.DN,barCls:'bc-dn',valCls:'bc-val-dn',lblCls:'bc-lbl-dn'},
    {key:'FP',cnt:cnt.FP,barCls:'bc-fp',valCls:'bc-val-fp',lblCls:'bc-lbl-fp'},
    {key:'FN',cnt:cnt.FN,barCls:'bc-fn',valCls:'bc-val-fn',lblCls:'bc-lbl-fn'},
  ];

  let analysisText2 = '';
  if (cnt.DP>0) analysisText2=`통증 동반 항목(DP ${cnt.DP})이 있어 전문 상담이 필요합니다.`;
  else if (cnt.FP>0) analysisText2=`기능 정상 ${fnPct}%. 제한 항목(FP ${cnt.FP}) 집중 관리가 필요합니다.`;
  else analysisText2=`모든 동작에서 정상적인 기능을 보입니다 (FN 100%).`;

  const rows2 = SFMA_ITEMS.map(item => {
    const val = h.sheetChecks[item.key]; if (!val) return '';
    return `<tr><td><span style="font-size:11px;color:#A0AEC0;margin-right:6px;">${item.num}.</span>${item.name}</td><td class="td-right"><span class="result-badge ${rbMap[val]||''}">${val}</span></td></tr>`;
  }).join('');

  document.getElementById('ds-body').innerHTML = `
    <div class="ucard" style="margin-bottom:10px;">
      <div class="result-body" style="grid-template-columns:1fr 1fr;">
        <div style="padding:0 12px 0 0; border-right:1px solid #F0F4F8;">
          <div class="bar-chart-wrap" style="height:80px;">
            ${bars2.map(b => {
              const bh = b.cnt===0?0:Math.max(6,Math.round((b.cnt/maxCnt2)*70));
              return `<div class="bc-col"><div class="bc-bar-wrap">${b.cnt>0?`<div class="bc-bar ${b.barCls}" style="height:${bh}px;"><span class="bc-val ${b.valCls}" style="font-size:11px;">${b.cnt}</span></div>`:`<div style="height:2px;width:100%;background:#E2E8F0;border-radius:2px;"></div>`}</div><div class="bc-lbl ${b.lblCls}">${b.key}</div></div>`;
            }).join('')}
          </div>
        </div>
        <div style="padding:0 0 0 12px;">
          <div class="analysis-text" style="font-size:11px;">${analysisText2}</div>
          <div class="analysis-chips" style="margin-top:8px;">
            ${cnt.FN?`<span class="an-chip an-fn">FN ${cnt.FN}</span>`:''}
            ${cnt.FP?`<span class="an-chip an-fp">FP ${cnt.FP}</span>`:''}
            ${cnt.DP?`<span class="an-chip an-dp">DP ${cnt.DP}</span>`:''}
            ${cnt.DN?`<span class="an-chip an-dn">DN ${cnt.DN}</span>`:''}
            <span class="an-total">· 총 ${tot}항목</span>
          </div>
        </div>
      </div>
    </div>
    <div class="ucard" style="padding:0;overflow:hidden;">
      <table class="dtbl">
        <thead><tr><th>패턴</th><th class="th-right">${h.round}차 ${h.date}</th></tr></thead>
        <tbody>${rows2}</tbody>
      </table>
    </div>
    ${h.opinion?`<div class="ucard" style="margin-top:10px;"><div class="ucard-title">💬 트레이너 소견</div><div class="opinion-card">${h.opinion}</div></div>`:''}`;

  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail(e) {
  if (e.target === document.getElementById('detail-overlay'))
    document.getElementById('detail-overlay').classList.remove('open');
}

function switchTab(id, btn) {
  document.querySelectorAll('.app-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
}

renderLoginScreen();
</script>
</body>
</html>
