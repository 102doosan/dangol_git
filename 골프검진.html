<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>골프검진 프로토타입</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #0D1F14;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 60px;
      gap: 20px;
    }

    /* ── 툴바 ── */
    .toolbar {
      width: 100%;
      max-width: 520px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .toolbar-title {
      font-size: 16px;
      font-weight: 900;
      color: #fff;
      margin-right: auto;
      letter-spacing: -0.3px;
    }
    .screen-btn {
      padding: 6px 14px;
      border-radius: 99px;
      border: none;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      background: #1A3326;
      color: #6EBD8A;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .screen-btn.active { background: #2F855A; color: #fff; box-shadow: 0 2px 8px rgba(47,133,90,0.4); }
    .screen-btn:hover:not(.active) { background: #2D4A38; color: #fff; }

    /* ── 폰 프레임 ── */
    .phone {
      width: 375px;
      height: 780px;
      background: #f5f5f5;
      border-radius: 44px;
      box-shadow: 0 0 0 10px #111, 0 32px 80px rgba(0,0,0,0.65);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .phone-notch {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 28px;
      background: #111;
      border-radius: 0 0 18px 18px;
      z-index: 20;
    }
    .phone-inner {
      flex: 1;
      margin-top: 28px;
      overflow: hidden;
      position: relative;
    }

    /* ── 화면 공통 ── */
    .screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      background: #f5f7f5;
    }
    .screen.active { display: flex; }

    /* ── 스크롤 본문 ── */
    .scroll-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .scroll-body::-webkit-scrollbar { width: 3px; }
    .scroll-body::-webkit-scrollbar-thumb { background: #c8e6c9; border-radius: 99px; }

    /* ── 앱 헤더 ── */
    .app-header {
      background: linear-gradient(135deg, #1B4332, #2D6A4F);
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .header-title { font-size: 17px; font-weight: 900; flex: 1; letter-spacing: -0.5px; }
    .back-btn {
      background: rgba(255,255,255,0.18);
      border: none;
      color: #fff;
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .back-btn:hover { background: rgba(255,255,255,0.3); }

    /* ── 배지 ── */
    .badge { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 99px; }
    .badge-A { background: #C6F6D5; color: #1A4731; }
    .badge-B { background: #BEE3F8; color: #1A365D; }
    .badge-C { background: #FEFCBF; color: #744210; }
    .badge-D { background: #FED7D7; color: #742A2A; }

    /* ── 점수 원 ── */
    .score-circle {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: conic-gradient(var(--c) var(--pct), #E2E8F0 0);
      display: flex; align-items: center; justify-content: center;
      position: relative;
      flex-shrink: 0;
    }
    .score-circle::before {
      content: '';
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      background: #fff;
    }
    .score-circle-inner {
      position: relative; z-index: 1;
      text-align: center;
    }
    .score-num { font-size: 20px; font-weight: 900; line-height: 1; }
    .score-label { font-size: 9px; color: #888; margin-top: 1px; }

    /* ── 항목 카드 (메인) ── */
    .item-card {
      background: #fff;
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      box-shadow: 0 1px 5px rgba(0,0,0,0.07);
      border: 1.5px solid transparent;
      transition: all 0.15s;
    }
    .item-card:hover { border-color: #2F855A; box-shadow: 0 2px 12px rgba(47,133,90,0.15); transform: translateY(-1px); }
    .item-icon-box {
      width: 46px; height: 46px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-size: 14px; font-weight: 700; color: #1A202C; margin-bottom: 3px; }
    .item-desc { font-size: 11px; color: #888; line-height: 1.4; }
    .item-score-box { text-align: right; flex-shrink: 0; }
    .item-score { font-size: 20px; font-weight: 900; }
    .item-grade { font-size: 10px; font-weight: 700; margin-top: 1px; }

    /* ── 진행 바 ── */
    .prog-bar-wrap { margin: 6px 0 0; }
    .prog-bar-bg { background: #F0F4F8; border-radius: 99px; height: 6px; overflow: hidden; }
    .prog-bar-fill { height: 100%; border-radius: 99px; transition: width 0.8s ease; }

    /* ── 비교 세션 칩 ── */
    .sess-chip {
      padding: 6px 14px; border-radius: 99px;
      border: 1.5px solid #E2E8F0; background: #fff;
      font-size: 12px; font-weight: 700; cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif; color: #718096;
      transition: all .15s; white-space: nowrap;
    }
    .sess-chip.active { background: #2F855A; border-color: #2F855A; color: #fff; }

    /* ── 이력 아이템 ── */
    .hist-item {
      background: #fff;
      border-radius: 12px;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      cursor: pointer;
      transition: all .15s;
    }
    .hist-item:hover { box-shadow: 0 2px 10px rgba(47,133,90,0.12); transform: translateY(-1px); }
    .hist-date-box { text-align: center; flex-shrink: 0; }
    .hist-month { font-size: 10px; font-weight: 700; color: #888; }
    .hist-day { font-size: 22px; font-weight: 900; color: #1A202C; line-height: 1; }
    .hist-info { flex: 1; }
    .hist-title { font-size: 13px; font-weight: 700; color: #1A202C; margin-bottom: 3px; }
    .hist-trainer { font-size: 11px; color: #A0AEC0; }
    .hist-score { font-size: 22px; font-weight: 900; color: #2F855A; flex-shrink: 0; }

    /* ── 운동 추천 카드 ── */
    .ex-rec-card {
      background: #fff;
      border-radius: 12px;
      padding: 13px 14px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      border-left: 3px solid;
    }
    .rec-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
    .rec-info { flex: 1; }
    .rec-name { font-size: 13px; font-weight: 700; color: #1A202C; margin-bottom: 2px; }
    .rec-meta { font-size: 11px; color: #888; }
    .rec-reason { font-size: 11px; color: #2F855A; margin-top: 4px; font-weight: 600; }

    /* ── 탭 바 ── */
    .tab-bar {
      display: flex;
      background: #fff;
      border-bottom: 1px solid #e9ecef;
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1; padding: 11px 0;
      border: none; background: transparent;
      font-size: 12px; font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      color: #A0AEC0; cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.15s;
    }
    .tab-btn.active { color: #2F855A; border-bottom-color: #2F855A; }

    /* ── 섹션 레이블 ── */
    .sec-label {
      font-size: 11px; font-weight: 800; color: #A0AEC0;
      letter-spacing: 1px; margin-bottom: 8px; margin-top: 4px;
    }

    /* ── 종합 점수 카드 (결과 요약) ── */
    .total-card {
      background: linear-gradient(135deg, #1B4332, #2D6A4F);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      color: #fff;
    }
    .total-score-big { font-size: 52px; font-weight: 900; line-height: 1; }
    .total-score-unit { font-size: 16px; font-weight: 600; opacity: 0.7; }
    .total-grade { font-size: 13px; font-weight: 800; background: rgba(255,255,255,0.2); border-radius: 8px; padding: 4px 12px; margin-top: 6px; display: inline-block; }

    /* ── 레이더 차트 (SVG) ── */
    .radar-wrap {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.07);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── 상세 항목 탭 ── */
    .detail-tab-row {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
      flex-shrink: 0;
    }
    .detail-tab-row::-webkit-scrollbar { height: 0; }
    .detail-chip {
      padding: 6px 12px; border-radius: 99px;
      border: 1.5px solid #E2E8F0; background: #fff;
      font-size: 11px; font-weight: 700; cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif; color: #718096;
      white-space: nowrap; transition: all .15s; flex-shrink: 0;
    }
    .detail-chip.active { background: #2F855A; border-color: #2F855A; color: #fff; }

    /* ── 상세 내용 카드 ── */
    .detail-content-card {
      background: #fff;
      border-radius: 16px;
      padding: 18px 16px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.07);
    }

    /* ── 비교 바 ── */
    .cmp-bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .cmp-label { font-size: 11px; font-weight: 700; color: #4A5568; width: 64px; flex-shrink: 0; }
    .cmp-bars { flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .cmp-bar {
      height: 10px; border-radius: 5px;
      transition: width 0.6s ease;
      position: relative;
    }
    .cmp-score-txt { font-size: 10px; font-weight: 700; color: #718096; width: 26px; text-align: right; flex-shrink: 0; }

    /* ── 빈 상태 ── */
    .empty-state { text-align: center; padding: 40px 20px; color: #ccc; font-size: 13px; }
    .empty-state .empty-icon { font-size: 36px; margin-bottom: 10px; }

    /* ── 하단 CTA 버튼 ── */
    .bottom-cta {
      padding: 12px 14px 16px;
      background: #fff;
      border-top: 1px solid #F0F4F8;
      flex-shrink: 0;
    }
    .cta-btn {
      width: 100%;
      background: linear-gradient(135deg, #2F855A, #38A169);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      box-shadow: 0 4px 14px rgba(47,133,90,0.35);
    }
    .cta-btn:active { transform: scale(0.98); }
    .cta-btn-outline {
      width: 100%;
      background: #fff;
      color: #2F855A;
      border: 2px solid #2F855A;
      border-radius: 14px;
      padding: 13px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<!-- 툴바 -->
<div class="toolbar">
  <span class="toolbar-title">⛳ 골프검진 프로토타입</span>
  <button class="screen-btn active" onclick="go('main')">① 메인</button>
  <button class="screen-btn" onclick="go('result')">② 결과 요약</button>
  <button class="screen-btn" onclick="go('detail')">③ 결과 상세</button>
  <button class="screen-btn" onclick="go('compare')">④ 결과 비교</button>
  <button class="screen-btn" onclick="go('history')">⑤ 검진 이력</button>
  <button class="screen-btn" onclick="go('recommend')">⑥ 맞춤 운동</button>
  <span style="width:1px;height:20px;background:#333;flex-shrink:0;"></span>
  <span style="font-size:11px;font-weight:700;color:#9AE6B4;flex-shrink:0;">회원:</span>
  <button class="screen-btn" id="member-btn-1" onclick="selectGolfMember(1)">김태훈</button>
  <button class="screen-btn" id="member-btn-2" onclick="selectGolfMember(2)">이서연</button>
  <button class="screen-btn" id="member-btn-3" onclick="selectGolfMember(3)">박민준</button>
  <button class="screen-btn" id="member-btn-4" onclick="selectGolfMember(4)">정유진</button>
  <button class="screen-btn" id="member-btn-5" onclick="selectGolfMember(5)">최준혁</button>
</div>

<!-- 폰 프레임 -->
<div class="phone">
  <div class="phone-notch"></div>
  <div class="phone-inner">

    <!-- ① 골프검진 메인 -->
    <div class="screen active" id="screen-main">
      <div class="app-header">
        <span style="font-size:22px;">⛳</span>
        <span class="header-title">골프검진</span>
        <button onclick="go('history')" style="background:rgba(255,255,255,0.18);border:none;color:#fff;border-radius:8px;padding:5px 11px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">이력 보기</button>
      </div>
      <div class="scroll-body" id="main-scroll">

        <!-- 최근 검진 배너 -->
        <div id="main-banner" style="background:linear-gradient(135deg,#1B4332,#2D6A4F);border-radius:16px;padding:16px;color:#fff;cursor:pointer;" onclick="go('result')">
          <div id="main-banner-inner"></div>
          <div style="margin-top:10px;font-size:11px;color:rgba(255,255,255,0.6);">결과 상세 보기 →</div>
        </div>

        <!-- 검진 항목 -->
        <div class="sec-label" style="margin-top:4px;">검진 항목</div>
        <div id="main-item-list"></div>

        <!-- 다음 검진 안내 -->
        <div id="main-next-card" style="background:#fff;border-radius:12px;padding:13px 16px;box-shadow:0 1px 4px rgba(0,0,0,0.06);display:flex;align-items:center;gap:10px;"></div>

      </div>
      <div class="bottom-cta">
        <button class="cta-btn" onclick="alert('검진 신청이 접수되었습니다.\n담당 트레이너가 일정을 확인 후 연락드립니다.')">⛳ 검진 신청하기</button>
      </div>
    </div>

    <!-- ② 결과 요약 -->
    <div class="screen" id="screen-result">
      <div class="app-header">
        <button class="back-btn" onclick="go('main')">←</button>
        <span class="header-title" id="result-header-title">검진 결과 요약</span>
        <button onclick="go('compare')" style="background:rgba(255,255,255,0.18);border:none;color:#fff;border-radius:8px;padding:5px 11px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">비교</button>
      </div>
      <div class="scroll-body" id="result-scroll">
        <!-- 회차 선택 칩 -->
        <div id="result-round-chips" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
        <!-- 종합 점수 카드 -->
        <div id="result-total-card"></div>
        <!-- 4그룹 바로가기 -->
        <div id="result-group-shortcuts" style="display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;flex-shrink:0;margin-bottom:4px;"></div>
        <!-- 4그룹 카드 -->
        <div class="sec-label">검진 그룹별 점수</div>
        <div id="result-group-cards"></div>
        <!-- 트레이너 소견 -->
        <div style="background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 1px 5px rgba(0,0,0,0.07);">
          <div class="sec-label">트레이너 종합 소견</div>
          <div id="result-comment" style="font-size:13px;color:#2D3748;line-height:1.7;"></div>
          <div style="margin-top:10px;font-size:11px;color:#A0AEC0;">담당 트레이너 · 박지훈</div>
        </div>
        <div style="display:flex;gap:8px;">
          <button onclick="go('detail')" style="flex:1;background:#F0FFF4;color:#2F855A;border:1.5px solid #C6F6D5;border-radius:12px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">📋 상세 보기</button>
          <button onclick="go('recommend')" style="flex:1;background:#2F855A;color:#fff;border:none;border-radius:12px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">💪 맞춤 운동</button>
        </div>
      </div>
    </div>

    <!-- ③ 결과 상세 -->
    <div class="screen" id="screen-detail">
      <div class="app-header">
        <button class="back-btn" onclick="go('result')">←</button>
        <span class="header-title" id="detail-header-title">결과 상세</span>
      </div>
      <!-- 회차 선택 + 그룹 탭 -->
      <div style="background:#fff;padding:10px 14px 8px;border-bottom:1px solid #F0F4F8;flex-shrink:0;">
        <div id="detail-round-row" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;"></div>
        <div class="detail-tab-row" id="detail-tab-row"></div>
      </div>
      <div class="scroll-body" id="detail-scroll">
        <div id="detail-content"></div>
        <!-- 갤러리 -->
        <div id="detail-gallery-section" style="display:none;">
          <div class="sec-label">첨부 이미지</div>
          <div id="detail-gallery-grid"></div>
        </div>
      </div>
    </div>

    <!-- ④ 결과 비교 -->
    <div class="screen" id="screen-compare">
      <div class="app-header">
        <button class="back-btn" onclick="go('result')">←</button>
        <span class="header-title">결과 비교</span>
      </div>
      <div class="scroll-body" id="compare-scroll">
        <div class="sec-label">비교할 검진 선택 (최대 3회)</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;" id="cmp-sess-chips"></div>
        <div id="cmp-chart" style="margin-top:4px;"></div>
      </div>
    </div>

    <!-- ⑤ 검진 이력 -->
    <div class="screen" id="screen-history">
      <div class="app-header">
        <button class="back-btn" onclick="go('main')">←</button>
        <span class="header-title">검진 이력</span>
      </div>
      <div class="scroll-body" id="history-scroll">
        <div class="sec-label">전체 3회 검진</div>
        <div id="history-list"></div>
      </div>
      <div class="bottom-cta">
        <button class="cta-btn" onclick="alert('검진 신청이 접수되었습니다.')">⛳ 새 검진 신청</button>
      </div>
    </div>

    <!-- ⑥ 맞춤 운동 추천 -->
    <div class="screen" id="screen-recommend">
      <div class="app-header">
        <button class="back-btn" onclick="go('result')">←</button>
        <span class="header-title">골프 맞춤 운동 추천</span>
      </div>
      <div style="background:linear-gradient(135deg,#1B4332,#2D6A4F);padding:12px 16px;flex-shrink:0;">
        <div style="font-size:12px;color:rgba(255,255,255,0.7);margin-bottom:2px;">검진 결과 기반 맞춤 프로그램</div>
        <div style="font-size:15px;font-weight:800;color:#fff;">취약 항목 강화 운동 8개 추천</div>
      </div>
      <div style="background:#fff;padding:8px 14px;border-bottom:1px solid #F0F4F8;flex-shrink:0;">
        <div style="display:flex;gap:6px;overflow-x:auto;" id="rec-filter-chips"></div>
      </div>
      <div class="scroll-body" id="recommend-scroll">
        <div id="rec-ex-list"></div>

// ── 골프 스코어 계산 ──────────────────────────────────────────
function golfStd(item, gender){ return gender==='여' ? item.std.f : item.std.m; }
function golfScore(item, value, gender){
  if(item.isText) return 100;
  if(item.isBool) return value ? 100 : 0;
  if(item.isSeq){
    const diff = Math.abs(value - item.std.m);
    if(diff === 0) return 110;
    if(diff === 1) return 80;
    return 50;
  }
  const std = golfStd(item, gender);
  if(std === 0) return 100;
  if(item.lowerBetter){
    if(value <= 0) return 130;
    return Math.round(std / Math.max(value, 0.01) * 100);
  }
  return Math.round(value / std * 100);
}
function golfGrade(pct){
  if(pct>=110) return {g:'A', label:'우수', color:'#2F855A', bg:'#C6F6D5'};
  if(pct>=90)  return {g:'B+', label:'양호', color:'#2B6CB0', bg:'#BEE3F8'};
  if(pct>=70)  return {g:'B', label:'보통', color:'#744210', bg:'#FEFCBF'};
  return             {g:'C', label:'주의', color:'#742A2A', bg:'#FED7D7'};
}
function golfBarColor(pct){
  if(pct>=110) return '#2F855A';
  if(pct>=90)  return '#4299E1';
  if(pct>=70)  return '#ECC94B';
  return '#E53E3E';
}
function golfGroupAvg(m, h, gid){
  const g=GOLF_GROUPS.find(x=>x.id===gid); if(!g) return 0;
  let t=0,c=0;
  g.items.forEach(it=>{ if(it.isText) return; const v=h[it.id]; if(!v) return; t+=golfScore(it,v.value,m.gender); c++; });
  return c?Math.round(t/c):0;
}
function golfTotalAvg(m, h){
  let t=0,c=0;
  ALL_GOLF_ITEMS.forEach(it=>{ if(it.isText) return; const v=h[it.id]; if(!v) return; t+=golfScore(it,v.value,m.gender); c++; });
  return c?Math.round(t/c):0;
}

function go(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  document.querySelectorAll('.screen-btn').forEach((b, i) => {
    const ids = ['main','result','detail','compare','history','recommend'];
    b.classList.toggle('active', ids[i] === id);
  });
  _screen = id;

  const scrollMap = { main:'main-scroll', result:'result-scroll', detail:'detail-scroll',
    compare:'compare-scroll', history:'history-scroll', recommend:'recommend-scroll' };
  const el = document.getElementById(scrollMap[id]);
  if (el) el.scrollTop = 0;

  if (id === 'main')      renderMain();
  if (id === 'result')    renderGolfResult();
  if (id === 'detail')    renderGolfDetail(_golfDetailGroup);
  if (id === 'compare')   renderCompare();
  if (id === 'history')   renderHistory();
  if (id === 'recommend') renderRecommend();
}

function buildGolfRadar(m, h, size) {
  const cx = size/2, cy = size/2, r = size*0.38;
  const groups = GOLF_GROUPS;
  const n = groups.length;
  const pts = groups.map((g,i)=>{
    const angle = (Math.PI*2*i/n)-Math.PI/2;
    const pct = Math.min(golfGroupAvg(m,h,g.id)/100, 1.3);
    return { x: cx+r*pct*Math.cos(angle), y: cy+r*pct*Math.sin(angle),
             gx: cx+(r+14)*Math.cos(angle), gy: cy+(r+14)*Math.sin(angle) };
  });
  const gridPts = [0.25,0.5,0.75,1].map(pct=>
    groups.map((_,i)=>{ const angle=(Math.PI*2*i/n)-Math.PI/2; return `${cx+r*pct*Math.cos(angle)},${cy+r*pct*Math.sin(angle)}`; }).join(' ')
  );
  const polyPts = pts.map(p=>`${p.x},${p.y}`).join(' ');
  const labels = ['K-vest','Trackman','Sam Putt','TPI'];
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
    ${gridPts.map(gp=>`<polygon points="${gp}" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>`).join('')}
    ${groups.map((_,i)=>{ const angle=(Math.PI*2*i/n)-Math.PI/2; return `<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(angle)}" y2="${cy+r*Math.sin(angle)}" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>`; }).join('')}
    <polygon points="${polyPts}" fill="rgba(104,211,145,0.25)" stroke="#68D391" stroke-width="2"/>
    ${pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="3" fill="#68D391"/>`).join('')}
    ${pts.map((p,i)=>`<text x="${p.gx}" y="${p.gy+4}" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.75)" font-family="Noto Sans KR,sans-serif">${labels[i]||''}</text>`).join('')}
  </svg>`;
}

/* ══════════════════════════════════════
   ③ 결과 상세 (골프검진 실제 데이터)
══════════════════════════════════════ */
function renderGolfDetail(gid) {
  _golfDetailGroup = gid;
  const m = getSelectedMember();
  const h = getSelectedHistory();
  if(!m || !h) return;

  const el = document.getElementById('detail-header-title');
  if(el) el.textContent = `${m.name} · 결과 상세`;

  // 회차 선택 칩
  const roundRow = document.getElementById('detail-round-row');
  if(roundRow && m.history.length > 1){
    roundRow.innerHTML = m.history.map(hh=>{
      const sel = hh.round === h.round;
      return `<div onclick="_selectedRound=${hh.round};renderGolfDetail('${gid}')" style="
        padding:4px 10px;border-radius:99px;font-size:11px;font-weight:700;cursor:pointer;
        background:${sel?'#2F855A':'#fff'};color:${sel?'#fff':'#718096'};
        border:1.5px solid ${sel?'#2F855A':'#E2E8F0'};font-family:inherit;">${hh.round}회차</div>`;
    }).join('');
  } else if(roundRow){ roundRow.innerHTML=''; }

  // 그룹 탭
  document.getElementById('detail-tab-row').innerHTML = GOLF_GROUPS.map(g=>`
    <div class="detail-chip${g.id===gid?' active':''}" onclick="renderGolfDetail('${g.id}')" style="${g.id===gid?'background:#2F855A;border-color:#2F855A;color:#fff;':''}">${g.icon} ${g.name.split(' ')[0]}</div>`
  ).join('');

  const g = GOLF_GROUPS.find(x=>x.id===gid);
  const pct = golfGroupAvg(m,h,gid);
  const gr = golfGrade(pct);

  let detailBody = '';

  if(gid === 'kvest'){
    // K-vest: 시퀀스 테이블 + 시각화 + 분석결과
    const seqVals = KVEST_SEGS.map(s=>({seg:s, val:h[s.id]?.value}));
    const filled = seqVals.filter(x=>x.val!==undefined);
    const sorted = [...filled].sort((a,b)=>a.val-b.val);
    const seqRow = sorted.map((x,i)=>{
      const correct = x.val===x.seg.std;
      return `${i>0?'<span style="color:rgba(255,255,255,0.6);font-size:16px;margin:0 2px;">→</span>':''}
        <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
          <div style="width:40px;height:40px;border-radius:50%;background:${x.seg.color};display:flex;align-items:center;justify-content:center;font-size:18px;border:3px solid ${correct?'#9AE6B4':'#FEB2B2'};">${x.seg.icon}</div>
          <div style="font-size:10px;font-weight:700;color:#fff;">${x.seg.label}</div>
          <span style="font-size:11px;font-weight:900;padding:1px 5px;border-radius:99px;background:${correct?'rgba(154,230,180,0.25)':'rgba(254,178,178,0.25)'};color:${correct?'#9AE6B4':'#FEB2B2'};">${x.val}${correct?'✓':'!'}</span>
        </div>`;
    }).join('');

    // 이전 회차 시퀀스 이력
    const histRows = m.history.length > 1 ? m.history.slice().reverse().map(hh=>{
      const segsRow = KVEST_SEGS.map(s=>{
        const v=hh[s.id]?.value;
        const correct=(v!==undefined && v===s.std);
        return `<span style="font-size:13px;font-weight:900;color:${correct?'#9AE6B4':v!==undefined?'#FEB2B2':'rgba(255,255,255,0.3)'};">
          ${v!==undefined?v:'-'}
        </span>`;
      }).join('<span style="color:rgba(255,255,255,0.3);margin:0 2px;">·</span>');
      return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.08);">
        <span style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.5);width:36px;flex-shrink:0;">${hh.round}회차</span>
        <span style="font-size:9px;color:rgba(255,255,255,0.35);width:60px;flex-shrink:0;">${hh.date}</span>
        <div style="display:flex;align-items:center;gap:4px;flex:1;">${segsRow}</div>
      </div>`;
    }).join('') : '';

    const analysisTxt = h[KVEST_ANALYSIS_ID]?.value||'';
    const analysisHtml = analysisTxt ? `<div style="font-size:12px;color:#2D3748;background:#F7F9FC;border-radius:8px;padding:8px 10px;border-left:3px solid #276749;line-height:1.8;white-space:pre-wrap;">${analysisTxt}</div>` : '';

    detailBody = `
      <div style="background:${g.color};border-radius:14px;padding:14px 16px;color:#fff;margin-bottom:10px;">
        <div style="font-size:13px;font-weight:700;opacity:.8;margin-bottom:4px;">${g.icon} ${g.name}</div>
        <div style="font-size:32px;font-weight:900;line-height:1;">${pct}%</div>
        <div style="display:inline-block;background:rgba(255,255,255,0.2);border-radius:8px;padding:3px 10px;margin-top:5px;font-size:12px;font-weight:700;">${gr.g} ${gr.label}</div>
      </div>

      <div style="background:rgba(44,122,123,0.85);border-radius:14px;padding:14px 16px;margin-bottom:10px;">
        <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.7);margin-bottom:10px;">📊 키네마틱 시퀀스 (이번 회차)</div>
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:8px;">${seqRow}</div>
        <div style="font-size:10px;color:rgba(255,255,255,0.5);margin-top:4px;">표준: 골반(1) → 몸통(2) → 팔(3) → 클럽(4) · 녹색=일치 / 빨간=불일치</div>
      </div>

      ${analysisHtml ? `<div style="background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;">
        <div style="font-size:11px;font-weight:800;color:#2C7A7B;margin-bottom:8px;">📋 분석결과</div>
        ${analysisHtml}
      </div>` : ''}

      ${histRows ? `<div style="background:#fff;border-radius:14px;padding:14px 16px;">
        <div style="font-size:11px;font-weight:800;color:#2C7A7B;margin-bottom:8px;">📅 회차별 시퀀스 이력</div>
        <div style="font-size:10px;color:#718096;margin-bottom:8px;">골반 · 몸통 · 팔 · 클럽 순서 (녹색=표준 일치)</div>
        ${m.history.slice().reverse().map(hh=>{
          const segsRow2 = KVEST_SEGS.map(s=>{
            const v=hh[s.id]?.value;
            const correct=(v!==undefined && v===s.std);
            return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
              <div style="width:32px;height:32px;border-radius:50%;background:${s.color};display:flex;align-items:center;justify-content:center;font-size:15px;border:2px solid ${correct?'#2F855A':'#E53E3E'};">${s.icon}</div>
              <span style="font-size:11px;font-weight:900;color:${correct?'#2F855A':'#E53E3E'};">${v!==undefined?v:'-'}</span>
            </div>`;
          }).join('<span style="color:#CBD5E0;font-size:14px;margin:0 1px;align-self:center;">→</span>');
          return `<div style="padding:8px 0;border-bottom:1px solid #F0F4F8;">
            <div style="font-size:10px;font-weight:700;color:#718096;margin-bottom:6px;">${hh.round}회차 · ${hh.date}</div>
            <div style="display:flex;align-items:center;gap:4px;">${segsRow2}</div>
          </div>`;
        }).join('')}
      </div>` : ''}`;
  } else if(gid === 'tpi'){
    const tpiG = GOLF_GROUPS.find(x=>x.id==='tpi');
    const passCount = tpiG.items.filter(it=>h[it.id]?.value===1).length;
    const total = tpiG.items.length;
    const tpiCells = tpiG.items.map(it=>{
      const v=h[it.id]; const pass=(v?.value===1);
      return `<div style="background:${pass?'#F0FFF4':'#FFF5F5'};border-radius:10px;padding:8px 10px;border:1.5px solid ${pass?'#C6F6D5':'#FED7D7'};display:flex;align-items:center;justify-content:space-between;gap:6px;">
        <span style="font-size:10px;font-weight:700;color:#2D3748;line-height:1.3;flex:1;">${it.label}</span>
        <span style="font-size:16px;font-weight:900;flex-shrink:0;">${pass?'⭕':'❌'}</span>
      </div>`;
    }).join('');
    detailBody = `
      <div style="background:${g.color};border-radius:14px;padding:14px 16px;color:#fff;margin-bottom:10px;">
        <div style="font-size:13px;font-weight:700;opacity:.8;margin-bottom:4px;">${g.icon} ${g.name}</div>
        <div style="font-size:32px;font-weight:900;line-height:1;">${passCount}<span style="font-size:16px;opacity:.7;">/${total}</span></div>
        <div style="font-size:13px;opacity:.7;margin-bottom:6px;">통과 항목</div>
        <div style="display:inline-block;background:rgba(255,255,255,0.2);border-radius:8px;padding:3px 10px;font-size:12px;font-weight:700;">${gr.g} ${gr.label}</div>
      </div>
      <div style="background:#fff;border-radius:14px;padding:14px 16px;">
        <div style="font-size:11px;font-weight:800;color:#276749;margin-bottom:10px;">검사 항목 결과 · 통과 <strong>${passCount}</strong>개 / 미통과 <strong>${total-passCount}</strong>개</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">${tpiCells}</div>
      </div>`;
  } else {
    // 기존 그룹: 항목 2열 그리드
    const itemCells = g.items.map(it=>{
      const v=h[it.id]; if(!v) return '';
      const std=golfStd(it,m.gender);
      const ipct=golfScore(it,v.value,m.gender);
      const igr=golfGrade(ipct);
      const fillW=Math.min(ipct,100);
      const color=golfBarColor(ipct);
      return `<div style="background:#F7F9FC;border-radius:12px;padding:13px 14px;border:1.5px solid #E2E8F0;">
        <div style="font-size:12px;font-weight:700;color:#2D3748;margin-bottom:8px;">${it.label}</div>
        <div style="display:flex;align-items:baseline;gap:5px;margin-bottom:8px;">
          <span style="font-size:20px;font-weight:900;color:${color};">${v.value}</span>
          <span style="font-size:11px;color:#A0AEC0;">${it.unit}</span>
          <span style="font-size:11px;font-weight:700;padding:2px 7px;border-radius:99px;background:${igr.bg};color:${igr.color};margin-left:auto;">${igr.g}</span>
        </div>
        <div style="background:#EDF2F7;border-radius:99px;height:8px;overflow:hidden;margin-bottom:5px;">
          <div style="width:${fillW}%;height:100%;background:${color};border-radius:99px;"></div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:10px;font-weight:700;color:${color};">${ipct}%</span>
          <span style="font-size:10px;color:#A0AEC0;">기준 ${std}${it.unit?' '+it.unit:''}${it.lowerBetter?' (낮을수록↓)':''}</span>
        </div>
      </div>`;
    }).join('');

    detailBody = `
      <div style="background:${g.color};border-radius:14px;padding:14px 16px;color:#fff;margin-bottom:10px;">
        <div style="font-size:13px;font-weight:700;opacity:.8;margin-bottom:4px;">${g.icon} ${g.name}</div>
        <div style="font-size:32px;font-weight:900;line-height:1;">${pct}%</div>
        <div style="display:inline-block;background:rgba(255,255,255,0.2);border-radius:8px;padding:3px 10px;margin-top:5px;font-size:12px;font-weight:700;">${gr.g} ${gr.label}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;">
        ${itemCells}
      </div>`;
  }

  document.getElementById('detail-content').innerHTML = detailBody;

  // 이미지 갤러리
  const galSec = document.getElementById('detail-gallery-section');
  const galGrid = document.getElementById('detail-gallery-grid');
  if(h.images && h.images.length && galSec && galGrid){
    galSec.style.display='block';
    galGrid.innerHTML = h.images.map(img=>`
      <div onclick="openGolfImgModal('${img.dataUrl}')" style="border-radius:10px;overflow:hidden;border:1.5px solid #E2E8F0;cursor:pointer;margin-bottom:8px;">
        <img src="${img.dataUrl}" alt="${img.name}" style="width:100%;height:auto;display:block;background:#F7F9FC;" />
        <div style="font-size:11px;color:#718096;padding:5px 10px;background:#F0F4F8;">${img.name}</div>
      </div>`).join('');
  } else if(galSec){ galSec.style.display='none'; }

  document.getElementById('detail-scroll').scrollTop=0;
}

  document.getElementById('detail-content').innerHTML = `

        <div style="width:70px;height:70px;border-radius:16px;background:${it.bg};display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0;">${it.icon}</div>
        <div style="flex:1;">

      return `<div class="detail-content-card" style="margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">

        <div class="prog-bar-bg" style="margin-bottom:8px;">

        </div>

      </div>`;
    }).join('')}

    <!-- 이전 회차와 비교 -->
    <div class="sec-label">이전 검진 대비</div>
    <div class="detail-content-card">
      <div style="display:flex;align-items:center;justify-content:center;gap:20px;">
        ${SESSIONS.map((s, i) => {
          const prev = s.scores[it.id];
          const diff = i === 0 ? 0 : SESSIONS[i-1].scores[it.id] - prev;
          return `<div style="text-align:center;">
            <div style="font-size:10px;color:#A0AEC0;margin-bottom:4px;">${s.label} · ${s.date}</div>
            <div style="font-size:24px;font-weight:900;color:${i===0?it.color:'#A0AEC0'};">${prev}</div>
            ${i > 0 && diff !== 0 ? `<div style="font-size:11px;font-weight:700;color:${diff>0?'#E53E3E':'#38A169'};">${diff>0?'▼':'▲'}${Math.abs(diff)}</div>` : ''}
          </div>`;
        }).join('<div style="width:1px;height:40px;background:#E2E8F0;"></div>')}
      </div>
    </div>

    <div style="display:flex;gap:8px;margin-top:4px;">
      ${_detailIdx > 0 ? `<button onclick="renderDetail(${_detailIdx-1})" style="flex:1;background:#F0FFF4;color:#2F855A;border:1.5px solid #C6F6D5;border-radius:12px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">← 이전 항목</button>` : '<div style="flex:1;"></div>'}

    </div>
  `;

  document.getElementById('detail-scroll').scrollTop = 0;

function openDetail(idx) {
  _detailIdx = idx;

}

   ④ 결과 비교

  document.getElementById('cmp-sess-chips').innerHTML = SESSIONS.map((s, i) =>

    <!-- 범례 -->
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;padding-top:10px;border-top:1px solid #F0F4F8;">
      ${sel.map((si, ci) =>
        `<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#718096;">
          <div style="width:12px;height:12px;border-radius:3px;background:${colors[ci]};"></div>
          ${SESSIONS[si].label} · ${SESSIONS[si].date}
        </div>`
      ).join('')}
    </div>
  </div>`;

  document.getElementById('cmp-chart').innerHTML = html;
}

function toggleCmpSess(idx) {
  if (_cmpSelected.includes(idx)) {
    if (_cmpSelected.length <= 1) return;
    _cmpSelected = _cmpSelected.filter(i => i !== idx);
  } else {
    if (_cmpSelected.length >= 3) return;
    _cmpSelected.push(idx);
  }
  renderCompare();
}

/* ══════════════════════════════════════
   레이더 차트 (SVG)
══════════════════════════════════════ */
function buildRadar(scores, size, mini) {
  const cx = size / 2, cy = size / 2, r = size * 0.38;
  const keys = ['swing','mobility','posture','muscle','flex'];
  const labels = ['스윙','관절','체형','근력','유연성'];
  const n = keys.length;
  const pts = keys.map((k, i) => {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const val = (scores[k] / 100);
    return { x: cx + r * val * Math.cos(angle), y: cy + r * val * Math.sin(angle),
             gx: cx + (r + 16) * Math.cos(angle), gy: cy + (r + 16) * Math.sin(angle) };
  });
  const gridPts = [0.25, 0.5, 0.75, 1].map(pct =>
    keys.map((k, i) => {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      return `${cx + r * pct * Math.cos(angle)},${cy + r * pct * Math.sin(angle)}`;
    }).join(' ')
  );
  const polyPts = pts.map(p => `${p.x},${p.y}`).join(' ');

  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
    ${gridPts.map(gp => `<polygon points="${gp}" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>`).join('')}
    ${keys.map((k, i) => {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      return `<line x1="${cx}" y1="${cy}" x2="${cx + r * Math.cos(angle)}" y2="${cy + r * Math.sin(angle)}" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>`;
    }).join('')}
    <polygon points="${polyPts}" fill="rgba(104,211,145,0.25)" stroke="#68D391" stroke-width="2"/>
    ${pts.map(p => `<circle cx="${p.x}" cy="${p.y}" r="3" fill="#68D391"/>`).join('')}
    ${mini ? '' : pts.map((p, i) =>
      `<text x="${p.gx}" y="${p.gy + 4}" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.75)" font-family="Noto Sans KR,sans-serif">${labels[i]}</text>`
    ).join('')}
  </svg>`;
}
