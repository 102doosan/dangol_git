<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>재활운동 프로토타입</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #1A1A2E;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 60px;
      gap: 20px;
    }

    /* ── 툴바 ── */
    .toolbar {
      width: 100%;
      max-width: 480px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .toolbar-title {
      font-size: 16px;
      font-weight: 900;
      color: #fff;
      margin-right: auto;
      letter-spacing: -0.3px;
    }
    .screen-btn {
      padding: 6px 14px;
      border-radius: 99px;
      border: none;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      background: #2A2A4A;
      color: #A0AEC0;
      transition: all 0.18s;
    }
    .screen-btn.active { background: #E53E3E; color: #fff; }
    .screen-btn:hover:not(.active) { background: #3A3A5A; color: #fff; }

    /* ── 폰 프레임 ── */
    .phone {
      width: 375px;
      height: 780px;
      background: #f5f5f5;
      border-radius: 44px;
      box-shadow: 0 0 0 10px #111, 0 32px 80px rgba(0,0,0,0.65);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .phone-notch {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 28px;
      background: #111;
      border-radius: 0 0 18px 18px;
      z-index: 20;
    }
    .phone-inner {
      flex: 1;
      margin-top: 28px;
      overflow: hidden;
      position: relative;
    }

    /* ── 화면 공통 ── */
    .screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      background: #fff;
    }
    .screen.active { display: flex; }

    /* ── 앱 헤더 ── */
    .app-header {
      background: #E53E3E;
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      min-height: 54px;
    }
    .app-header .header-title {
      font-size: 17px;
      font-weight: 900;
      letter-spacing: -0.5px;
      flex: 1;
    }
    .back-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.35); }

    /* ── 탭 바 ── */
    .tab-bar {
      display: flex;
      background: #fff;
      border-bottom: 1px solid #e9ecef;
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      padding: 12px 0;
      border: none;
      background: transparent;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      color: #aaa;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.15s;
    }
    .tab-btn.active {
      color: #E53E3E;
      border-bottom-color: #E53E3E;
    }

    /* ── 스크롤 본문 ── */
    .scroll-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .scroll-body::-webkit-scrollbar { width: 3px; }
    .scroll-body::-webkit-scrollbar-thumb { background: #ddd; border-radius: 99px; }
    #wk-chips::-webkit-scrollbar { height: 0; }
    #wk-scroll::-webkit-scrollbar { width: 3px; }
    #wk-scroll::-webkit-scrollbar-thumb { background: #ddd; border-radius: 99px; }

    /* ── 탭 패널 ── */
    .tab-panel { display: none; flex-direction: column; gap: 10px; }
    .tab-panel.active { display: flex; }

    /* ── 루틴 카드 ── */
    .routine-card {
      background: #fff;
      border: 1px solid #f0f0f0;
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .routine-card:hover { border-color: #E53E3E; box-shadow: 0 2px 10px rgba(229,62,62,0.12); transform: translateY(-1px); }
    .routine-card:active { transform: scale(0.98); }
    .rc-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .rc-info { flex: 1; }
    .rc-name { font-size: 14px; font-weight: 700; color: #1a1a1a; margin-bottom: 3px; }
    .rc-meta { font-size: 11px; color: #888; }
    .rc-arrow { font-size: 14px; color: #ccc; flex-shrink: 0; }

    /* ── 프로그램 카드 ── */
    .prog-card {
      background: #fff;
      border: 1px solid #f0f0f0;
      border-radius: 14px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .prog-card:hover { border-color: #E53E3E; box-shadow: 0 2px 10px rgba(229,62,62,0.12); transform: translateY(-1px); }
    .prog-card:active { transform: scale(0.98); }
    .pc-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .pc-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .pc-name { font-size: 14px; font-weight: 700; color: #1a1a1a; flex: 1; }
    .pc-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .pc-tag {
      font-size: 10px;
      color: #666;
      background: #f5f5f5;
      padding: 2px 7px;
      border-radius: 99px;
    }
    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
    }
    .badge-green { background: #C6F6D5; color: #276749; }
    .badge-orange { background: #FEEBC8; color: #9C4221; }
    .badge-red { background: #FED7D7; color: #9B2C2C; }

    /* ── 회복 루틴 상세 ── */
    .timeline { display: flex; flex-direction: column; gap: 0; }
    .week-item { border-radius: 12px; overflow: hidden; margin-bottom: 8px; border: 1px solid #f0f0f0; }
    .week-header {
      display: flex;
      align-items: center;
      padding: 13px 16px;
      background: #fff;
      cursor: pointer;
      gap: 10px;
      transition: background 0.12s;
    }
    .week-header:hover { background: #FFF5F5; }
    .week-badge {
      background: #E53E3E;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 99px;
      flex-shrink: 0;
    }
    .week-goal { font-size: 12px; font-weight: 600; color: #333; flex: 1; }
    .week-arrow { font-size: 12px; color: #ccc; transition: transform 0.2s; }
    .week-arrow.open { transform: rotate(90deg); }
    .week-body {
      display: none;
      border-top: 1px solid #f5f5f5;
      background: #FFFAFA;
    }
    .week-body.open { display: block; }
    .caution-box {
      margin: 10px 14px 0;
      background: #FFF5F5;
      border: 1px solid #FED7D7;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 11px;
      color: #C53030;
      display: flex;
      gap: 6px;
      align-items: flex-start;
    }
    .ex-list { padding: 10px 14px 14px; display: flex; flex-direction: column; gap: 7px; }
    .ex-item {
      background: #fff;
      border: 1px solid #f0f0f0;
      border-radius: 8px;
      padding: 9px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .ex-name { font-size: 12px; font-weight: 600; color: #1a1a1a; }
    .ex-reps { font-size: 11px; color: #E53E3E; font-weight: 700; white-space: nowrap; }
    .ex-note { font-size: 10px; color: #888; margin-top: 2px; }

    /* ── 재활 프로그램 상세 ── */
    .prog-info-box {
      background: #FFF5F5;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 4px;
    }
    .prog-info-title { font-size: 16px; font-weight: 900; color: #1a1a1a; margin-bottom: 10px; }
    .prog-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .prog-info-item {
      background: #fff;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 11px;
    }
    .prog-info-label { color: #999; margin-bottom: 2px; }
    .prog-info-value { font-weight: 700; color: #1a1a1a; font-size: 13px; }

    .section-label {
      font-size: 12px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      margin-top: 4px;
    }
    .motion-card {
      background: #fff;
      border: 1px solid #f0f0f0;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 7px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .motion-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: #FFF5F5;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }
    .motion-info { flex: 1; }
    .motion-name { font-size: 13px; font-weight: 700; color: #1a1a1a; margin-bottom: 3px; }
    .motion-reps { font-size: 11px; color: #E53E3E; font-weight: 600; margin-bottom: 3px; }
    .motion-desc { font-size: 10px; color: #888; line-height: 1.5; }
    .motion-simple {
      background: #fff;
      border: 1px solid #f0f0f0;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 7px;
      font-size: 12px;
      font-weight: 600;
      color: #333;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .motion-simple::before { content: '•'; color: #E53E3E; font-size: 14px; }

    .prog-note-box {
      background: #FFF5F5;
      border: 1px solid #FED7D7;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 11px;
      color: #C53030;
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    /* 운동 플레이어 리스트 아이템 */
    .player-ex-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid #F7FAFC;
    }
    .player-ex-item:last-child { border-bottom: none; }
    .player-num {
      width: 28px; height: 28px; border-radius: 50%;
      background: #6B46C1; color: #fff; font-size: 12px; font-weight: 800;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .player-ex-info { flex: 1; min-width: 0; }
    .player-ex-name { font-size: 13px; font-weight: 700; color: #1A202C; }
    .player-ex-sets { font-size: 11px; color: #A0AEC0; margin-top: 2px; }
    .player-play-btn {
      width: 32px; height: 32px; border-radius: 50%; border: 2px solid #E9D8FD;
      background: #FAF5FF; display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: #6B46C1; cursor: pointer; flex-shrink: 0;
    }
    .player-play-btn:hover { background: #E9D8FD; }

    /* ── 빈 상태 ── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #ccc;
      font-size: 13px;
    }
    .empty-state .empty-icon { font-size: 36px; margin-bottom: 10px; }
  </style>
</head>
<body>

<!-- 툴바 -->
<div class="toolbar">
  <span class="toolbar-title">📱 재활운동 프로토타입</span>
  <button class="screen-btn active" onclick="go('main')">① 메인/홈</button>
  <button class="screen-btn" onclick="go('routine')">② 회복 루틴 상세</button>
  <button class="screen-btn" onclick="go('program')">③ 재활 프로그램 상세</button>
  <button class="screen-btn" onclick="go('player')">④ 운동 플레이어</button>
  <button class="screen-btn" onclick="go('workout')">⑤ 운동 따라하기</button>
</div>

<!-- 폰 프레임 -->
<div class="phone">
  <div class="phone-notch"></div>
  <div class="phone-inner">

    <!-- ① 메인 화면 -->
    <div class="screen active" id="screen-main">
      <div class="app-header">
        <span class="header-title">🩺 재활운동</span>
      </div>
      <div class="tab-bar">
        <button class="tab-btn active" id="tab-btn-routine" onclick="switchTab('routine')">🗓 회복 루틴</button>
        <button class="tab-btn" id="tab-btn-program" onclick="switchTab('program')">📋 재활 프로그램</button>
      </div>
      <div class="scroll-body" id="main-scroll">
        <!-- 회복 루틴 탭 -->
        <div class="tab-panel active" id="panel-routine"></div>
        <!-- 재활 프로그램 탭 -->
        <div class="tab-panel" id="panel-program"></div>
      </div>
    </div>

    <!-- ② 회복 루틴 상세 -->
    <div class="screen" id="screen-routine">
      <div class="app-header">
        <button class="back-btn" onclick="go('main')">←</button>
        <span class="header-title" id="routine-header-title">회복 루틴 상세</span>
      </div>
      <div class="scroll-body" id="routine-scroll">
        <div class="timeline" id="routine-timeline"></div>
      </div>
    </div>

    <!-- ③ 재활 프로그램 상세 -->
    <div class="screen" id="screen-program">
      <div class="app-header">
        <button class="back-btn" onclick="go('main')">←</button>
        <span class="header-title" id="program-header-title">재활 프로그램 상세</span>
        <button id="prog-start-btn" onclick="startProgram()" style="margin-left:auto;background:rgba(255,255,255,0.25);color:#fff;border:none;border-radius:10px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">▶ 운동 시작</button>
      </div>
      <div class="scroll-body" id="program-scroll">
        <div id="program-detail"></div>
      </div>
    </div>

    <!-- ④ 운동 플레이어 -->
    <div class="screen" id="screen-player">
      <!-- 헤더 -->
      <div style="background:linear-gradient(135deg,#553C9A,#6B46C1);padding:14px 16px 20px;flex-shrink:0;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <button class="back-btn" onclick="goBackFromPlayer()" style="background:rgba(255,255,255,0.2);color:#fff;">←</button>
          <button id="player-start-btn" onclick="startWorkout(0)" style="background:#fff;color:#6B46C1;border:none;border-radius:10px;padding:7px 16px;font-size:12px;font-weight:800;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">▶ 운동 시작</button>
        </div>
        <div style="font-size:11px;color:rgba(255,255,255,0.7);margin-bottom:4px;" id="player-sub">재활 프로그램</div>
        <div style="font-size:20px;font-weight:900;color:#fff;margin-bottom:10px;" id="player-title">운동 제목</div>
        <div style="font-size:12px;color:rgba(255,255,255,0.8);" id="player-meta">운동 0개 · 예상 0분 · 총 수행 0회</div>
      </div>
      <!-- 요약 카드 -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 14px;background:#f8f5ff;flex-shrink:0;">
        <div style="background:#fff;border-radius:10px;padding:10px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.06);">
          <div style="font-size:18px;font-weight:900;color:#6B46C1;" id="ps-total">0</div>
          <div style="font-size:10px;color:#888;margin-top:2px;">총 완료</div>
        </div>
        <div style="background:#fff;border-radius:10px;padding:10px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.06);">
          <div style="font-size:18px;font-weight:900;color:#ED8936;" id="ps-streak">🔥 0일</div>
          <div style="font-size:10px;color:#888;margin-top:2px;">연속 달성</div>
        </div>
        <div style="background:#fff;border-radius:10px;padding:10px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.06);">
          <div style="font-size:13px;font-weight:800;color:#2B6CB0;" id="ps-date">-</div>
          <div style="font-size:10px;color:#888;margin-top:2px;">최근 수행</div>
        </div>
      </div>
      <!-- 운동 목록 -->
      <div style="flex:1;overflow-y:auto;padding:0 14px 16px;" id="player-list"></div>
      <!-- 알림 설정 -->
      <div style="padding:14px 16px;background:#fff;border-top:1px solid #F0F4F8;flex-shrink:0;">
        <div style="font-size:12px;font-weight:800;color:#4A5568;margin-bottom:8px;">🔔 알림 설정</div>
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div>
            <div style="font-size:13px;font-weight:700;color:#1A202C;">운동 알림</div>
            <div style="font-size:11px;color:#A0AEC0;margin-top:1px;" id="alarm-desc">알림 꺼짐</div>
          </div>
          <div id="alarm-toggle" onclick="toggleAlarm()" style="width:42px;height:24px;border-radius:12px;background:#CBD5E0;cursor:pointer;position:relative;transition:background 0.2s;">
            <div id="alarm-thumb" style="position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left 0.2s;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ⑤ 운동 따라하기 -->
    <div class="screen" id="screen-workout">
      <!-- 상단 진행 바 -->
      <div style="padding:14px 14px 10px;background:#fff;border-bottom:1px solid #F0F4F8;flex-shrink:0;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
          <div style="font-size:13px;font-weight:800;color:#4A5568;min-width:32px;" id="wk-progress-text">1 / 3</div>
          <div style="flex:1;display:flex;gap:3px;" id="wk-progress-dashes"></div>
          <button id="wk-auto-btn" onclick="wkToggleAuto()" style="padding:5px 10px;border-radius:99px;border:1.5px solid #6B46C1;background:#F3F0FF;color:#6B46C1;font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;">▶ 자동진행</button>
          <button onclick="closeWorkout()" style="width:28px;height:28px;border-radius:50%;border:1.5px solid #E2E8F0;background:#fff;color:#718096;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Noto Sans KR',sans-serif;">×</button>
        </div>
        <!-- 운동 칩 스크롤 -->
        <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;" id="wk-chips"></div>
      </div>
      <!-- 본문 -->
      <div style="flex:1;overflow-y:auto;padding:14px 14px 0;" id="wk-scroll">
        <div style="font-size:14px;font-weight:700;margin-bottom:12px;" id="wk-status-text">준비하세요</div>
        <!-- 일러스트 카드 -->
        <div style="background:#EDE9FF;border-radius:18px;height:175px;display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:14px;overflow:hidden;" id="wk-illus-card">
          <div style="font-size:80px;line-height:1;" id="wk-illus">🧘</div>
          <div style="position:absolute;top:12px;right:12px;background:rgba(255,255,255,0.9);border-radius:8px;padding:4px 12px;font-size:12px;font-weight:800;color:#6B46C1;" id="wk-reps-badge">× 10회</div>
        </div>
        <!-- 운동명 + 정보 -->
        <div style="font-size:17px;font-weight:900;color:#1A202C;margin-bottom:4px;" id="wk-ex-name">운동명</div>
        <div style="font-size:12px;color:#A0AEC0;margin-bottom:16px;" id="wk-ex-info">3세트 × 10회 · 세트 간 휴식 60초</div>

let _curScreen = 'main';
let _curTab = 'routine';
let _selectedCatId = null;
let _selectedProgIdx = null;

/* ── 화면 전환 ── */
function go(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + screenId).classList.add('active');
  _curScreen = screenId;

  document.querySelectorAll('.screen-btn').forEach((b, i) => {
    const ids = ['main','routine','program','player','workout'];
    b.classList.toggle('active', ids[i] === screenId);
  });

  if (screenId === 'routine') renderRoutineDetail();
  if (screenId === 'program') renderProgramDetail();

  // 스크롤 맨 위로
  const scrollMap = { main:'main-scroll', routine:'routine-scroll', program:'program-scroll', workout:'wk-scroll' };
  const scrollEl = document.getElementById(scrollMap[screenId] || (screenId + '-scroll'));
  if (scrollEl) scrollEl.scrollTop = 0;
}

/* ── 탭 전환 ── */
function switchTab(tab) {
  _curTab = tab;
  document.getElementById('tab-btn-routine').classList.toggle('active', tab === 'routine');
  document.getElementById('tab-btn-program').classList.toggle('active', tab === 'program');
  document.getElementById('panel-routine').classList.toggle('active', tab === 'routine');
  document.getElementById('panel-program').classList.toggle('active', tab === 'program');
}

/* ── 루틴 상세로 이동 ── */
function openRoutineDetail(catId) {
  _selectedCatId = catId;
  go('routine');
}

/* ── 프로그램 상세로 이동 ── */
function openProgramDetail(idx) {
  _selectedProgIdx = idx;
  go('program');
}

/* ── 아코디언 토글 ── */
function toggleWeek(el) {
  const body = el.nextElementSibling;
  const arrow = el.querySelector('.week-arrow');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  arrow.classList.toggle('open', !isOpen);
}

/* ── 운동 플레이어 ── */
let _playerExercises = [];
let _playerTitle = '';
let _playerSub = '';
let _playerFrom = 'program'; // 'program' | 'routine'
let _alarmOn = false;

function startProgram() {
  if (_selectedProgIdx === null) return;
  const prog = progData[_selectedProgIdx];
  if (!prog) return;
  const exs = prog.motions.map(m => {
    const name = typeof m === 'object' ? m.name : m;
    const sets = typeof m === 'object' ? m.sets : '3';
    const reps = typeof m === 'object' ? m.reps : (() => {
      const md = motionData.find(d => d.name === name);
      return md ? md.reps : '10회';
    })();
    const importance = typeof m === 'object' ? m.importance : '';
    return { name, sets, reps, importance };
  });
  openPlayer(exs, prog.name, `재활 프로그램 · ${partMap[prog.part]}`, 'program', parseInt(prog.time) || 30);
}

function startRoutineWeek(catId, tmplIdx) {
  const tmpl = rxTemplates.filter(t => t.catId === catId)[tmplIdx];
  if (!tmpl) return;
  const cat = rxCatList.find(c => c.id === catId);
  const weekLabel = tmpl.weekStart === tmpl.weekEnd ? `${tmpl.weekStart}주차` : `${tmpl.weekStart}~${tmpl.weekEnd}주차`;
  const exs = tmpl.exercises.map(ex => ({ name: ex.name, sets: ex.sets, reps: ex.reps, importance: '' }));
  const totalMin = exs.reduce((a, e) => a + (parseInt(e.sets)||1) * 2, 0);
  openPlayer(exs, `${cat ? cat.name : ''} ${weekLabel}`, `회복 루틴 · ${tmpl.goal}`, 'routine', totalMin);
}

function openPlayer(exercises, title, sub, from, estimatedMin) {
  _playerExercises = exercises;
  _playerTitle = title;
  _playerSub = sub;
  _playerFrom = from;

  document.getElementById('player-title').textContent = title;
  document.getElementById('player-sub').textContent = sub;
  document.getElementById('player-meta').textContent = `운동 ${exercises.length}개 · 예상 ${estimatedMin}분 · 총 수행 ${exercises.reduce((a,e)=>a+(parseInt(e.sets)||1)*(parseInt(e.reps)||10),0)}회`;
  document.getElementById('ps-total').textContent = Math.floor(Math.random()*30)+5;
  document.getElementById('ps-streak').textContent = `🔥 ${Math.floor(Math.random()*7)+1}일`;
  document.getElementById('ps-date').textContent = '2026.03.25';

  document.getElementById('player-list').innerHTML = exercises.map((ex, i) => `
    <div class="player-ex-item">
      <div class="player-num">${i+1}</div>
      <div class="player-ex-info">
        <div class="player-ex-name">${ex.name}</div>
        <div class="player-ex-sets">${ex.sets}세트 × ${ex.reps}</div>
      </div>
      <div class="player-play-btn" onclick="startWorkout(${i})" title="이 운동부터 시작">▷</div>
    </div>`).join('');

  go('player');
}

function goBackFromPlayer() {
  go(_playerFrom === 'routine' ? 'routine' : 'program');
}

/* ── 워크아웃 따라하기 플레이어 ── */

let _wkSetIdx = 0;
let _wkPlaying = false;
let _wkAutoAdv = false;
let _wkCompleted = []; // 완료된 운동 인덱스 목록

function startWorkout(exIdx) {
  if (!_playerExercises.length) return;
  _wkIdx = exIdx || 0;
  _wkSetIdx = 0;
  _wkPlaying = false;
  _wkAutoAdv = false;
  _wkCompleted = [];
  renderWorkout();
  go('workout');
}

function renderWorkout() {
  const exList = _playerExercises;
  const ex = exList[_wkIdx];
  if (!ex) return;
  const total = exList.length;
  const sets = parseInt(ex.sets) || 3;

  // 진행 텍스트 + 대시
  document.getElementById('wk-progress-text').textContent = `${_wkIdx + 1} / ${total}`;
  document.getElementById('wk-progress-dashes').innerHTML = Array.from({length: total}, (_, i) =>
    `<div style="flex:1;height:4px;border-radius:2px;background:${_wkCompleted.includes(i)?'#38A169':i===_wkIdx?'#6B46C1':'#E2E8F0'};transition:background 0.3s;"></div>`
  ).join('');

  // 칩
  document.getElementById('wk-chips').innerHTML = exList.map((e, i) => {
    const isActive = i === _wkIdx;
    const isDone = _wkCompleted.includes(i);
    return `<div onclick="wkJumpTo(${i})" style="display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:99px;
      background:${isActive?'#6B46C1':isDone?'#C6F6D5':'#F3F0FF'};
      color:${isActive?'#fff':isDone?'#276749':'#6B46C1'};
      white-space:nowrap;cursor:pointer;font-size:11px;font-weight:700;flex-shrink:0;
      border:1.5px solid ${isActive?'#6B46C1':isDone?'#68D391':'#E9D8FD'};">
      <span style="background:${isActive?'rgba(255,255,255,0.25)':isDone?'rgba(56,161,105,0.15)':'#EDE9FF'};border-radius:99px;padding:1px 5px;font-size:10px;">${isDone?'✓':i+1}</span>
      ${e.name}&nbsp;<span style="font-weight:400;opacity:0.75;">${e.sets}×${e.reps}</span>
    </div>`;
  }).join('');

  // 활성 칩 스크롤
  setTimeout(() => {
    const chip = document.getElementById('wk-chips').children[_wkIdx];
    if (chip) chip.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  }, 60);

  // 일러스트
  const md = motionData.find(d => d.name === ex.name);
  document.getElementById('wk-illus').textContent = md ? md.icon : '🏃';
  document.getElementById('wk-reps-badge').textContent = `× ${ex.reps}`;
  document.getElementById('wk-ex-name').textContent = ex.name;
  const restTxt = md && md.reps ? '' : '';
  document.getElementById('wk-ex-info').textContent =
    `${ex.sets}세트 × ${ex.reps}${md && md.tool && md.tool !== '없음' ? ' · 도구: ' + md.tool : ''}`;

  // 세트 목록
  document.getElementById('wk-set-list').innerHTML = Array.from({length: sets}, (_, i) => {
    const done = i < _wkSetIdx;
    const active = i === _wkSetIdx && _wkPlaying;
    return `<div onclick="wkCompleteSet(${i})" style="
      display:flex;align-items:center;justify-content:space-between;padding:13px 16px;
      background:${done?'#F0FFF4':active?'#FAF5FF':'#fff'};
      border-bottom:${i < sets-1?'1px solid #F0F4F8':'none'};cursor:pointer;">
      <span style="font-size:13px;font-weight:700;color:${done?'#38A169':active?'#6B46C1':'#4A5568'};">
        ${done?'✓ ':''}<span style="font-size:14px;">${i+1}세트</span>
      </span>
      <span style="font-size:13px;font-weight:600;color:${done?'#38A169':'#A0AEC0'};">${ex.reps}</span>
    </div>`;
  }).join('');

  // 상태 텍스트
  const statusEl = document.getElementById('wk-status-text');
  if (_wkCompleted.includes(_wkIdx)) {
    statusEl.textContent = '✅ 완료!'; statusEl.style.color = '#38A169';
  } else if (_wkPlaying) {
    statusEl.textContent = `💪 ${_wkSetIdx + 1}세트 진행 중`; statusEl.style.color = '#6B46C1';
  } else if (_wkSetIdx > 0) {
    statusEl.textContent = `잠시 쉬세요 · ${_wkSetIdx}/${sets}세트 완료`; statusEl.style.color = '#ED8936';
  } else {
    statusEl.textContent = '준비하세요'; statusEl.style.color = '#38A169';
  }

  // 재생 버튼
  const playBtn = document.getElementById('wk-play-btn');
  const playLabel = document.getElementById('wk-play-label');
  if (_wkPlaying) {
    playBtn.textContent = '⏸'; playBtn.style.background = '#E53E3E';
    playBtn.style.boxShadow = '0 4px 12px rgba(229,62,62,0.4)';
    playLabel.textContent = '일시정지';
  } else {
    playBtn.textContent = '▶'; playBtn.style.background = '#38A169';
    playBtn.style.boxShadow = '0 4px 12px rgba(56,161,105,0.4)';
    playLabel.textContent = _wkSetIdx > 0 ? '재개' : '시작';
  }

  // 자동진행 버튼
  const autoBtn = document.getElementById('wk-auto-btn');
  autoBtn.style.background = _wkAutoAdv ? '#6B46C1' : '#F3F0FF';
  autoBtn.style.color = _wkAutoAdv ? '#fff' : '#6B46C1';
  autoBtn.style.borderColor = '#6B46C1';
}

function wkJumpTo(idx) {
  _wkIdx = idx; _wkSetIdx = 0; _wkPlaying = false;
  renderWorkout();
  document.getElementById('wk-scroll').scrollTop = 0;
}

function wkCompleteSet(setIdx) {
  if (setIdx !== _wkSetIdx) return;
  const ex = _playerExercises[_wkIdx];
  const sets = parseInt(ex.sets) || 3;
  _wkPlaying = false;
  _wkSetIdx++;
  if (_wkSetIdx >= sets) {
    // 이 운동 완료
    if (!_wkCompleted.includes(_wkIdx)) _wkCompleted.push(_wkIdx);
    renderWorkout();
    if (_wkAutoAdv && _wkIdx < _playerExercises.length - 1) {
      setTimeout(() => { _wkIdx++; _wkSetIdx = 0; renderWorkout(); document.getElementById('wk-scroll').scrollTop = 0; }, 900);
    }
  } else {
    renderWorkout();
  }
}

function wkTogglePlay() {
  _wkPlaying = !_wkPlaying;
  renderWorkout();
}

function wkStop() {
  _wkPlaying = false;
  _wkSetIdx = 0;
  renderWorkout();
}

function wkNext() {
  if (_wkIdx < _playerExercises.length - 1) {
    _wkIdx++; _wkSetIdx = 0; _wkPlaying = false;
    renderWorkout();
    document.getElementById('wk-scroll').scrollTop = 0;
  }
}

function wkToggleAuto() {
  _wkAutoAdv = !_wkAutoAdv;
  renderWorkout();
}

function closeWorkout() {
  _wkPlaying = false;
  go('player');
}

function toggleAlarm() {
  _alarmOn = !_alarmOn;
  document.getElementById('alarm-toggle').style.background = _alarmOn ? '#6B46C1' : '#CBD5E0';
  document.getElementById('alarm-thumb').style.left = _alarmOn ? '20px' : '2px';
  document.getElementById('alarm-desc').textContent = _alarmOn ? '매일 오전 9시 알림' : '알림 꺼짐';
}

/* ── 메인 화면 렌더링 ── */
function renderMain() {
  // 회복 루틴 패널
  const routinePanel = document.getElementById('panel-routine');
  routinePanel.innerHTML = '';
  if (rxCatList.length === 0) {
    routinePanel.innerHTML = '<div class="empty-state"><div class="empty-icon">🗓</div>등록된 회복 루틴이 없습니다</div>';
  } else {
    rxCatList.forEach(cat => {
      const weekCount = rxTemplates.filter(t => t.catId === cat.id).length;
      const bg = partBg[cat.part] || '#F7FAFC';
      const icon = partIcon[cat.part] || '⭕';
      const partName = partMap[cat.part] || cat.part;
      const card = document.createElement('div');
      card.className = 'routine-card';
      card.onclick = () => openRoutineDetail(cat.id);
      card.innerHTML = `
        <div class="rc-icon" style="background:${bg}">${icon}</div>
        <div class="rc-info">
          <div class="rc-name">${cat.name}</div>
          <div class="rc-meta">${partName} · ${weekCount}단계 구성</div>
        </div>
        <div class="rc-arrow">›</div>
      `;
      routinePanel.appendChild(card);
    });
  }

  // 재활 프로그램 패널
  const programPanel = document.getElementById('panel-program');
  programPanel.innerHTML = '';
  const activeProgs = progData.filter(p => p.active);
  if (activeProgs.length === 0) {
    programPanel.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div>등록된 프로그램이 없습니다</div>';
  } else {
    activeProgs.forEach((prog, i) => {
      const realIdx = progData.indexOf(prog);
      const bg = partBg[prog.part] || '#F7FAFC';
      const icon = partIcon[prog.part] || '⭕';
      const partName = partMap[prog.part] || prog.part;
      const badgeClass = levelBadge[prog.level] || 'badge-green';
      const card = document.createElement('div');
      card.className = 'prog-card';
      card.onclick = () => openProgramDetail(realIdx);
      card.innerHTML = `
        <div class="pc-top">
          <div class="pc-icon" style="background:${bg}">${icon}</div>
          <div class="pc-name">${prog.name}</div>
          <span class="badge ${badgeClass}">${prog.level}</span>
        </div>
        <div class="pc-meta">
          <span class="pc-tag">📅 ${prog.duration}</span>
          <span class="pc-tag">🔄 ${prog.freq}</span>
          <span class="pc-tag">⏱ ${prog.time}분</span>
          <span class="pc-tag">👥 ${prog.count}명</span>
        </div>
      `;
      programPanel.appendChild(card);
    });
  }
}

/* ── 회복 루틴 상세 렌더링 ── */
function renderRoutineDetail() {
  const cat = rxCatList.find(c => c.id === _selectedCatId);
  if (!cat) return;

  document.getElementById('routine-header-title').textContent = cat.name;

  const templates = rxTemplates.filter(t => t.catId === _selectedCatId);
  const container = document.getElementById('routine-timeline');
  container.innerHTML = '';

  if (templates.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div>등록된 루틴이 없습니다</div>';
    return;
  }

  templates.forEach((tmpl, idx) => {
    const weekLabel = tmpl.weekStart === tmpl.weekEnd
      ? `${tmpl.weekStart}주차`
      : `${tmpl.weekStart}~${tmpl.weekEnd}주차`;

    const item = document.createElement('div');
    item.className = 'week-item';

    const cautionHTML = tmpl.caution
      ? `<div class="caution-box">⚠️ <span>${tmpl.caution}</span></div>`
      : '';

    const exHTML = tmpl.exercises.map(ex => {
      const repsStr = ex.sets && ex.sets !== '1'
        ? `${ex.reps} × ${ex.sets}세트${ex.rest ? ' / 휴식 ' + ex.rest : ''}`
        : `${ex.reps}${ex.rest ? ' / 휴식 ' + ex.rest : ''}`;
      const noteHTML = ex.note ? `<div class="ex-note">${ex.note}</div>` : '';
      return `
        <div class="ex-item">
          <div>
            <div class="ex-name">${ex.name}</div>
            ${noteHTML}
          </div>
          <div class="ex-reps">${repsStr}</div>
        </div>`;
    }).join('');

    item.innerHTML = `
      <div class="week-header" onclick="toggleWeek(this)">
        <span class="week-badge">${weekLabel}</span>
        <span class="week-goal">${tmpl.goal}</span>
        <button onclick="event.stopPropagation();startRoutineWeek(${_selectedCatId},${idx})" style="margin-left:auto;background:#E53E3E;color:#fff;border:none;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;flex-shrink:0;">▶ 시작</button>
        <span class="week-arrow ${idx === 0 ? 'open' : ''}">›</span>
      </div>
      <div class="week-body ${idx === 0 ? 'open' : ''}">
        ${cautionHTML}
        <div class="ex-list">${exHTML}</div>
      </div>
    `;
    container.appendChild(item);
  });
}

/* ── 재활 프로그램 상세 렌더링 ── */
function renderProgramDetail() {
  if (_selectedProgIdx === null) return;
  const prog = progData[_selectedProgIdx];
  if (!prog) return;

  document.getElementById('program-header-title').textContent = prog.name;

  const bg = partBg[prog.part] || '#F7FAFC';
  const icon = partIcon[prog.part] || '⭕';
  const partName = partMap[prog.part] || prog.part;
  const badgeClass = levelBadge[prog.level] || 'badge-green';

  const container = document.getElementById('program-detail');

  const motionsHTML = prog.motions.map(m => {
    const mName = typeof m === 'object' ? m.name : m;
    const mData = motionData.find(d => d.name === mName);
    if (mData) {
      return `
        <div class="motion-card">
          <div class="motion-icon">${mData.icon}</div>
          <div class="motion-info">
            <div class="motion-name">${mData.name}</div>
            <div class="motion-reps">${mData.reps}</div>
            <div class="motion-desc">${mData.desc}</div>
          </div>
        </div>`;
    } else {
      return `<div class="motion-simple">${mName}</div>`;
    }
  }).join('');

  const noteHTML = prog.note
    ? `<div class="prog-note-box">⚠️ <span>${prog.note}</span></div>`
    : '';

  container.innerHTML = `
    <div class="prog-info-box">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <div style="width:46px;height:46px;border-radius:12px;background:${bg};display:flex;align-items:center;justify-content:center;font-size:22px">${icon}</div>
        <div>
          <div style="font-size:15px;font-weight:900;color:#1a1a1a">${prog.name}</div>
          <div style="margin-top:4px"><span class="badge ${badgeClass}">${prog.level}</span> <span style="font-size:11px;color:#888;margin-left:4px">${partName}</span></div>
        </div>
      </div>
      <div class="prog-info-grid">
        <div class="prog-info-item">
          <div class="prog-info-label">📅 기간</div>
          <div class="prog-info-value">${prog.duration}</div>
        </div>
        <div class="prog-info-item">
          <div class="prog-info-label">🔄 빈도</div>
          <div class="prog-info-value">${prog.freq}</div>
        </div>
        <div class="prog-info-item">
          <div class="prog-info-label">⏱ 세션</div>
          <div class="prog-info-value">${prog.time}분</div>
        </div>
        <div class="prog-info-item">
          <div class="prog-info-label">👥 참여</div>
          <div class="prog-info-value">${prog.count}명</div>
        </div>
      </div>
    </div>
    ${noteHTML}
    <div class="section-label">동작 구성</div>
    ${motionsHTML}
  `;
}

/* ── 초기화 ── */
renderMain();
// 기본값: 루틴 상세는 첫 번째 catId, 프로그램 상세는 첫 번째 active 항목
_selectedCatId = rxCatList[0]?.id ?? null;
_selectedProgIdx = progData.findIndex(p => p.active);
</script>
</body>
</html>
