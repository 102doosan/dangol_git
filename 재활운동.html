<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>재활운동 프로토타입</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #1A1A2E;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 60px;
      gap: 20px;
    }

    /* ── 툴바 ── */
    .toolbar {
      width: 100%;
      max-width: 480px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .toolbar-title {
      font-size: 16px;
      font-weight: 900;
      color: #fff;
      margin-right: auto;
      letter-spacing: -0.3px;
    }
    .screen-btn {
      padding: 6px 14px;
      border-radius: 99px;
      border: none;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      background: #2A2A4A;
      color: #A0AEC0;
      transition: all 0.18s;
    }
    .screen-btn.active { background: #E53E3E; color: #fff; }
    .screen-btn:hover:not(.active) { background: #3A3A5A; color: #fff; }

    /* ── 폰 프레임 ── */
    .phone {
      width: 375px;
      height: 780px;
      background: #f5f5f5;
      border-radius: 44px;
      box-shadow: 0 0 0 10px #111, 0 32px 80px rgba(0,0,0,0.65);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .phone-notch {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 28px;
      background: #111;
      border-radius: 0 0 18px 18px;
      z-index: 20;
    }
    .phone-inner {
      flex: 1;
      margin-top: 28px;
      overflow: hidden;
      position: relative;
    }

    /* ── 화면 공통 ── */
    .screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      background: #fff;
    }
    .screen.active { display: flex; }

    /* ── 앱 헤더 ── */
    .app-header {
      background: #E53E3E;
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      min-height: 54px;
    }
    .app-header .header-title {
      font-size: 17px;
      font-weight: 900;
      letter-spacing: -0.5px;
      flex: 1;
    }
    .back-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.35); }

    /* ── 탭 바 ── */
    .tab-bar {
      display: flex;
      background: #fff;
      border-bottom: 1px solid #e9ecef;
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      padding: 12px 0;
      border: none;
      background: transparent;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      color: #aaa;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.15s;
    }
    .tab-btn.active {
      color: #E53E3E;
      border-bottom-color: #E53E3E;
    }

    /* ── 스크롤 본문 ── */
    .scroll-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .scroll-body::-webkit-scrollbar { width: 3px; }
    .scroll-body::-webkit-scrollbar-thumb { background: #ddd; border-radius: 99px; }

    /* ── 탭 패널 ── */
    .tab-panel { display: none; flex-direction: column; gap: 10px; }
    .tab-panel.active { display: flex; }

    /* ── 루틴 카드 ── */
    .routine-card {
      background: #fff;
      border: 1px solid #f0f0f0;
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .routine-card:hover { border-color: #E53E3E; box-shadow: 0 2px 10px rgba(229,62,62,0.12); transform: translateY(-1px); }
    .routine-card:active { transform: scale(0.98); }
    .rc-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .rc-info { flex: 1; }
    .rc-name { font-size: 14px; font-weight: 700; color: #1a1a1a; margin-bottom: 3px; }
    .rc-meta { font-size: 11px; color: #888; }
    .rc-arrow { font-size: 14px; color: #ccc; flex-shrink: 0; }

    /* ── 프로그램 카드 ── */
    .prog-card {
      background: #fff;
      border: 1px solid #f0f0f0;
      border-radius: 14px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .prog-card:hover { border-color: #E53E3E; box-shadow: 0 2px 10px rgba(229,62,62,0.12); transform: translateY(-1px); }
    .prog-card:active { transform: scale(0.98); }
    .pc-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .pc-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .pc-name { font-size: 14px; font-weight: 700; color: #1a1a1a; flex: 1; }
    .pc-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .pc-tag {
      font-size: 10px;
      color: #666;
      background: #f5f5f5;
      padding: 2px 7px;
      border-radius: 99px;
    }
    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
    }
    .badge-green { background: #C6F6D5; color: #276749; }
    .badge-orange { background: #FEEBC8; color: #9C4221; }
    .badge-red { background: #FED7D7; color: #9B2C2C; }

    /* ── 회복 루틴 상세 ── */
    .timeline { display: flex; flex-direction: column; gap: 0; }
    .week-item { border-radius: 12px; overflow: hidden; margin-bottom: 8px; border: 1px solid #f0f0f0; }
    .week-header {
      display: flex;
      align-items: center;
      padding: 13px 16px;
      background: #fff;
      cursor: pointer;
      gap: 10px;
      transition: background 0.12s;
    }
    .week-header:hover { background: #FFF5F5; }
    .week-badge {
      background: #E53E3E;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 99px;
      flex-shrink: 0;
    }
    .week-goal { font-size: 12px; font-weight: 600; color: #333; flex: 1; }
    .week-arrow { font-size: 12px; color: #ccc; transition: transform 0.2s; }
    .week-arrow.open { transform: rotate(90deg); }
    .week-body {
      display: none;
      border-top: 1px solid #f5f5f5;
      background: #FFFAFA;
    }
    .week-body.open { display: block; }
    .caution-box {
      margin: 10px 14px 0;
      background: #FFF5F5;
      border: 1px solid #FED7D7;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 11px;
      color: #C53030;
      display: flex;
      gap: 6px;
      align-items: flex-start;
    }
    .ex-list { padding: 10px 14px 14px; display: flex; flex-direction: column; gap: 7px; }
    .ex-item {
      background: #fff;
      border: 1px solid #f0f0f0;
      border-radius: 8px;
      padding: 9px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .ex-name { font-size: 12px; font-weight: 600; color: #1a1a1a; }
    .ex-reps { font-size: 11px; color: #E53E3E; font-weight: 700; white-space: nowrap; }
    .ex-note { font-size: 10px; color: #888; margin-top: 2px; }

    /* ── 재활 프로그램 상세 ── */
    .prog-info-box {
      background: #FFF5F5;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 4px;
    }
    .prog-info-title { font-size: 16px; font-weight: 900; color: #1a1a1a; margin-bottom: 10px; }
    .prog-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .prog-info-item {
      background: #fff;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 11px;
    }
    .prog-info-label { color: #999; margin-bottom: 2px; }
    .prog-info-value { font-weight: 700; color: #1a1a1a; font-size: 13px; }

    .section-label {
      font-size: 12px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      margin-top: 4px;
    }
    .motion-card {
      background: #fff;
      border: 1px solid #f0f0f0;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 7px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .motion-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: #FFF5F5;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }
    .motion-info { flex: 1; }
    .motion-name { font-size: 13px; font-weight: 700; color: #1a1a1a; margin-bottom: 3px; }
    .motion-reps { font-size: 11px; color: #E53E3E; font-weight: 600; margin-bottom: 3px; }
    .motion-desc { font-size: 10px; color: #888; line-height: 1.5; }
    .motion-simple {
      background: #fff;
      border: 1px solid #f0f0f0;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 7px;
      font-size: 12px;
      font-weight: 600;
      color: #333;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .motion-simple::before { content: '•'; color: #E53E3E; font-size: 14px; }

    .prog-note-box {
      background: #FFF5F5;
      border: 1px solid #FED7D7;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 11px;
      color: #C53030;
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    /* ── 빈 상태 ── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #ccc;
      font-size: 13px;
    }
    .empty-state .empty-icon { font-size: 36px; margin-bottom: 10px; }
  </style>
</head>
<body>

<!-- 툴바 -->
<div class="toolbar">
  <span class="toolbar-title">📱 재활운동 프로토타입</span>
  <button class="screen-btn active" onclick="go('main')">① 메인/홈</button>
  <button class="screen-btn" onclick="go('routine')">② 회복 루틴 상세</button>
  <button class="screen-btn" onclick="go('program')">③ 재활 프로그램 상세</button>
</div>

<!-- 폰 프레임 -->
<div class="phone">
  <div class="phone-notch"></div>
  <div class="phone-inner">

    <!-- ① 메인 화면 -->
    <div class="screen active" id="screen-main">
      <div class="app-header">
        <span class="header-title">🩺 재활운동</span>
      </div>
      <div class="tab-bar">
        <button class="tab-btn active" id="tab-btn-routine" onclick="switchTab('routine')">🗓 회복 루틴</button>
        <button class="tab-btn" id="tab-btn-program" onclick="switchTab('program')">📋 재활 프로그램</button>
      </div>
      <div class="scroll-body" id="main-scroll">
        <!-- 회복 루틴 탭 -->
        <div class="tab-panel active" id="panel-routine"></div>
        <!-- 재활 프로그램 탭 -->
        <div class="tab-panel" id="panel-program"></div>
      </div>
    </div>

    <!-- ② 회복 루틴 상세 -->
    <div class="screen" id="screen-routine">
      <div class="app-header">
        <button class="back-btn" onclick="go('main')">←</button>
        <span class="header-title" id="routine-header-title">회복 루틴 상세</span>
      </div>
      <div class="scroll-body" id="routine-scroll">
        <div class="timeline" id="routine-timeline"></div>
      </div>
    </div>

    <!-- ③ 재활 프로그램 상세 -->
    <div class="screen" id="screen-program">
      <div class="app-header">
        <button class="back-btn" onclick="go('main')">←</button>
        <span class="header-title" id="program-header-title">재활 프로그램 상세</span>
      </div>
      <div class="scroll-body" id="program-scroll">
        <div id="program-detail"></div>
      </div>
    </div>

  </div>
</div>

<script>
/* ── 데이터 ── */
const partMap  = { shoulder:'어깨', knee:'무릎', back:'허리', ankle:'발목', neck:'목', hip:'고관절', etc:'기타' };
const partIcon = { shoulder:'🦾', knee:'🦵', back:'🧘', ankle:'🦶', neck:'🦒', hip:'🍑', etc:'⭕' };

  { part:'back', name:'요통 코어 안정화', level:'초급', duration:'4주', freq:'주 3회', time:'30', motions:['맥켄지 신전 운동','코어 안정화 운동','고관절 스트레칭'], note:'', active:true, count:12 },

  { part:'knee', name:'SLR 운동', level:'초급', icon:'🦿', reps:'15회 × 3세트', tool:'없음', desc:'누워서 한쪽 다리를 곧게 들어 올린다. 발목은 90도 유지' },

  { id:1, name:'디스크 시술', part:'back' },
  { id:2, name:'무릎 인공관절 수술', part:'knee' },
  { id:3, name:'어깨 회전근개 수술', part:'shoulder' },

  { id:5, name:'경추 디스크 수술', part:'neck' },
];

const rxTemplates = [
  { catId:1, weekStart:1, weekEnd:2, goal:'안정화 및 급성 통증 조절', caution:'앞으로 굽히는 동작 금지', exercises:[
    { name:'복식 호흡', reps:'5분', sets:'1', rest:'', note:'' },
    { name:'맥킨지 신전', reps:'10회', sets:'3', rest:'30초', note:'통증 없는 범위 내' },

/* ── 상태 ── */
let _curScreen = 'main';
let _curTab = 'routine';
let _selectedCatId = null;
let _selectedProgIdx = null;

/* ── 화면 전환 ── */
function go(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + screenId).classList.add('active');
  _curScreen = screenId;

  document.querySelectorAll('.screen-btn').forEach((b, i) => {
    const ids = ['main','routine','program'];
    b.classList.toggle('active', ids[i] === screenId);
  });

  if (screenId === 'routine') renderRoutineDetail();
  if (screenId === 'program') renderProgramDetail();

  // 스크롤 맨 위로
  const scrollEl = document.getElementById(screenId === 'main' ? 'main-scroll' : screenId + '-scroll');
  if (scrollEl) scrollEl.scrollTop = 0;
}

/* ── 탭 전환 ── */
function switchTab(tab) {
  _curTab = tab;
  document.getElementById('tab-btn-routine').classList.toggle('active', tab === 'routine');
  document.getElementById('tab-btn-program').classList.toggle('active', tab === 'program');
  document.getElementById('panel-routine').classList.toggle('active', tab === 'routine');
  document.getElementById('panel-program').classList.toggle('active', tab === 'program');
}

/* ── 루틴 상세로 이동 ── */
function openRoutineDetail(catId) {
  _selectedCatId = catId;
  go('routine');
}

/* ── 프로그램 상세로 이동 ── */
function openProgramDetail(idx) {
  _selectedProgIdx = idx;
  go('program');
}

/* ── 아코디언 토글 ── */
function toggleWeek(el) {
  const body = el.nextElementSibling;
  const arrow = el.querySelector('.week-arrow');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  arrow.classList.toggle('open', !isOpen);
}

/* ── 메인 화면 렌더링 ── */
function renderMain() {
  // 회복 루틴 패널
  const routinePanel = document.getElementById('panel-routine');
  routinePanel.innerHTML = '';
  if (rxCatList.length === 0) {
    routinePanel.innerHTML = '<div class="empty-state"><div class="empty-icon">🗓</div>등록된 회복 루틴이 없습니다</div>';
  } else {
    rxCatList.forEach(cat => {
      const weekCount = rxTemplates.filter(t => t.catId === cat.id).length;
      const bg = partBg[cat.part] || '#F7FAFC';
      const icon = partIcon[cat.part] || '⭕';
      const partName = partMap[cat.part] || cat.part;
      const card = document.createElement('div');
      card.className = 'routine-card';
      card.onclick = () => openRoutineDetail(cat.id);
      card.innerHTML = `
        <div class="rc-icon" style="background:${bg}">${icon}</div>
        <div class="rc-info">
          <div class="rc-name">${cat.name}</div>
          <div class="rc-meta">${partName} · ${weekCount}단계 구성</div>
        </div>
        <div class="rc-arrow">›</div>
      `;
      routinePanel.appendChild(card);
    });
  }

  // 재활 프로그램 패널
  const programPanel = document.getElementById('panel-program');
  programPanel.innerHTML = '';
  const activeProgs = progData.filter(p => p.active);
  if (activeProgs.length === 0) {
    programPanel.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div>등록된 프로그램이 없습니다</div>';
  } else {
    activeProgs.forEach((prog, i) => {
      const realIdx = progData.indexOf(prog);
      const bg = partBg[prog.part] || '#F7FAFC';
      const icon = partIcon[prog.part] || '⭕';
      const partName = partMap[prog.part] || prog.part;
      const badgeClass = levelBadge[prog.level] || 'badge-green';
      const card = document.createElement('div');
      card.className = 'prog-card';
      card.onclick = () => openProgramDetail(realIdx);
      card.innerHTML = `
        <div class="pc-top">
          <div class="pc-icon" style="background:${bg}">${icon}</div>
          <div class="pc-name">${prog.name}</div>
          <span class="badge ${badgeClass}">${prog.level}</span>
        </div>
        <div class="pc-meta">
          <span class="pc-tag">📅 ${prog.duration}</span>
          <span class="pc-tag">🔄 ${prog.freq}</span>
          <span class="pc-tag">⏱ ${prog.time}분</span>
          <span class="pc-tag">👥 ${prog.count}명</span>
        </div>
      `;
      programPanel.appendChild(card);
    });
  }
}

/* ── 회복 루틴 상세 렌더링 ── */
function renderRoutineDetail() {
  const cat = rxCatList.find(c => c.id === _selectedCatId);
  if (!cat) return;

  document.getElementById('routine-header-title').textContent = cat.name;

  const templates = rxTemplates.filter(t => t.catId === _selectedCatId);
  const container = document.getElementById('routine-timeline');
  container.innerHTML = '';

  if (templates.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div>등록된 루틴이 없습니다</div>';
    return;
  }

  templates.forEach((tmpl, idx) => {
    const weekLabel = tmpl.weekStart === tmpl.weekEnd
      ? `${tmpl.weekStart}주차`
      : `${tmpl.weekStart}~${tmpl.weekEnd}주차`;

    const item = document.createElement('div');
    item.className = 'week-item';

    const cautionHTML = tmpl.caution
      ? `<div class="caution-box">⚠️ <span>${tmpl.caution}</span></div>`
      : '';

    const exHTML = tmpl.exercises.map(ex => {
      const repsStr = ex.sets && ex.sets !== '1'
        ? `${ex.reps} × ${ex.sets}세트${ex.rest ? ' / 휴식 ' + ex.rest : ''}`
        : `${ex.reps}${ex.rest ? ' / 휴식 ' + ex.rest : ''}`;
      const noteHTML = ex.note ? `<div class="ex-note">${ex.note}</div>` : '';
      return `
        <div class="ex-item">
          <div>
            <div class="ex-name">${ex.name}</div>
            ${noteHTML}
          </div>
          <div class="ex-reps">${repsStr}</div>
        </div>`;
    }).join('');

    item.innerHTML = `
      <div class="week-header" onclick="toggleWeek(this)">
        <span class="week-badge">${weekLabel}</span>
        <span class="week-goal">${tmpl.goal}</span>
        <span class="week-arrow ${idx === 0 ? 'open' : ''}">›</span>
      </div>
      <div class="week-body ${idx === 0 ? 'open' : ''}">
        ${cautionHTML}
        <div class="ex-list">${exHTML}</div>
      </div>
    `;
    container.appendChild(item);
  });
}

/* ── 재활 프로그램 상세 렌더링 ── */
function renderProgramDetail() {
  if (_selectedProgIdx === null) return;
  const prog = progData[_selectedProgIdx];
  if (!prog) return;

  document.getElementById('program-header-title').textContent = prog.name;

  const bg = partBg[prog.part] || '#F7FAFC';
  const icon = partIcon[prog.part] || '⭕';
  const partName = partMap[prog.part] || prog.part;
  const badgeClass = levelBadge[prog.level] || 'badge-green';

  const container = document.getElementById('program-detail');

  const motionsHTML = prog.motions.map(m => {
    const mName = typeof m === 'object' ? m.name : m;
    const mData = motionData.find(d => d.name === mName);
    if (mData) {
      return `
        <div class="motion-card">
          <div class="motion-icon">${mData.icon}</div>
          <div class="motion-info">
            <div class="motion-name">${mData.name}</div>
            <div class="motion-reps">${mData.reps}</div>
            <div class="motion-desc">${mData.desc}</div>
          </div>
        </div>`;
    } else {
      return `<div class="motion-simple">${mName}</div>`;
    }
  }).join('');

  const noteHTML = prog.note
    ? `<div class="prog-note-box">⚠️ <span>${prog.note}</span></div>`
    : '';

  container.innerHTML = `
    <div class="prog-info-box">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <div style="width:46px;height:46px;border-radius:12px;background:${bg};display:flex;align-items:center;justify-content:center;font-size:22px">${icon}</div>
        <div>
          <div style="font-size:15px;font-weight:900;color:#1a1a1a">${prog.name}</div>
          <div style="margin-top:4px"><span class="badge ${badgeClass}">${prog.level}</span> <span style="font-size:11px;color:#888;margin-left:4px">${partName}</span></div>
        </div>
      </div>
      <div class="prog-info-grid">
        <div class="prog-info-item">
          <div class="prog-info-label">📅 기간</div>
          <div class="prog-info-value">${prog.duration}</div>
        </div>
        <div class="prog-info-item">
          <div class="prog-info-label">🔄 빈도</div>
          <div class="prog-info-value">${prog.freq}</div>
        </div>
        <div class="prog-info-item">
          <div class="prog-info-label">⏱ 세션</div>
          <div class="prog-info-value">${prog.time}분</div>
        </div>
        <div class="prog-info-item">
          <div class="prog-info-label">👥 참여</div>
          <div class="prog-info-value">${prog.count}명</div>
        </div>
      </div>
    </div>
    ${noteHTML}
    <div class="section-label">동작 구성</div>
    ${motionsHTML}
  `;
}

/* ── 초기화 ── */
renderMain();
// 기본값: 루틴 상세는 첫 번째 catId, 프로그램 상세는 첫 번째 active 항목
_selectedCatId = rxCatList[0]?.id ?? null;
_selectedProgIdx = progData.findIndex(p => p.active);
</script>
